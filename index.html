// ─── error logging — saves locally + auto-pushes to Notion via API ──────────
function logError(type,message,context={}){
  const entry={
    id:Date.now(),
    ts:new Date().toISOString(),
    type,
    message:String(message),
    context:JSON.stringify(context),
    protocol:window.location.protocol,
  };
  const existing=load('inv_errors',[]);
  const updated=[entry,...existing].slice(0,100);
  save('inv_errors',updated);
  console.error('[InvTerminal]',type,message,context);
  // Auto-push to Notion via serverless API (silent, non-blocking)
  if(window.location.protocol!=='file:'){
    fetch('/api/log-error',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify([{type,message:String(message),context:JSON.stringify(context),
        ts:entry.ts,protocol:window.location.protocol}])
    }).catch(()=>{});
  }
  return entry;
}

// ─── live data — single call to our Vercel serverless API ────────────────
// All market fetching now happens server-side (no CORS issues)
async function fetchAllMarketData(){
  try{
    const isLocal = window.location.protocol === 'file:';
    if(isLocal) throw new Error('Running as local file — open the hosted URL to get live data');
    const r = await Promise.race([
      fetch('/api/market-data'),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout after 10s')),10000))
    ]);
    if(!r.ok) throw new Error(`API returned ${r.status}`);
    const d = await r.json();
    // Log server-side errors (skip info messages and expected VIX proxy fallback)
    if(d.errors){
      Object.entries(d.errors).forEach(([k,v])=>{
        if(v && !k.includes('_info') && !v.includes('VIX proxy')){
          logError('FETCH_'+k.toUpperCase(), 'Server: '+v, {source:'api/market-data'});
        }
      });
    }
    return d; // {vix, spy, fg, ts, errors}
  }catch(e){
    logError('FETCH_ALL', e.message||'Failed to call /api/market-data', {protocol:window.location.protocol});
    return {vix:null, spy:null, fg:null};
  }
}

// ─── regime logic ─────────────────────────────────────────────────────────
function getRegime(vix,fg,spyAbove){
  if(vix>30||fg>80)return{
    name:'CAUTION ZONE',color:'#ef4444',icon:'⚠️',
    headline:'Stay mostly in cash. Protect what you have.',
    why:`VIX at ${fmt(vix)} signals elevated fear${fg>80?' and F&G above 80 means extreme greed — a dangerous combo':''}.`,
    action:'Reduce all positions to 50% exposure. Only enter if composite score ≥ 75. No new breakout trades.',
  };
  if(fg<20)return{
    name:'EXTREME FEAR',color:'#f97316',icon:'😱',
    headline:'Potential mean reversion bounce — tiny positions only.',
    why:`F&G at ${fg} is extreme fear territory. Historically this is where oversold bounces start, but it can get worse before it gets better.`,
    action:'1–2% position sizes maximum. Only RSI(2) < 5 setups on the strongest fundamentals.',
  };
  if(vix<18&&fg>55&&spyAbove)return{
    name:'BREAKOUT ZONE',color:'#22c55e',icon:'🚀',
    headline:'Trending market — chase volume-confirmed breakouts.',
    why:`VIX at ${fmt(vix)} (low fear), F&G at ${fg} (greed building), SPY above its 50-day trend line. This is a bull mode.`,
    action:'Deploy Strategy B. Buy breakouts above resistance on 1.5× average volume. 2–3% position size.',
  };
  return{
    name:'MEAN REVERSION ZONE',color:'#6366f1',icon:'🔄',
    headline:'Range-bound market — buy quality stocks that have pulled back.',
    why:`VIX at ${fmt(vix)} (moderate fear) and F&G at ${fg} — neither panicking nor euphoric. This is the ideal condition to buy oversold dips on strong stocks.`,
    action:'Deploy Strategy A. Look for RSI(2) < 10 on stocks above their 200-day EMA. 2–4% position size.',
  };
}

// ─── QUICK COMMANDS ──────────────────────────────────────────────────────
function QuickCommands(){
  const [copied,setCopied]=useState(null);

  const copy=(id,text)=>{
    navigator.clipboard.writeText(text).then(()=>{
      setCopied(id);
      setTimeout(()=>setCopied(null),2000);
    }).catch(()=>{
      // Fallback for non-secure contexts
      const el=document.createElement('textarea');
      el.value=text;document.body.appendChild(el);el.select();
      document.execCommand('copy');document.body.removeChild(el);
      setCopied(id);setTimeout(()=>setCopied(null),2000);
    });
  };

  const cmds=[
    {id:'analysis', icon:'🤖', label:'Full Analysis',     cmd:'run investment analysis',        color:'#6366f1', desc:'Signals + recommendations'},
    {id:'pulse',    icon:'🌡️', label:'Market Pulse',      cmd:'live market pulse',               color:'#3b82f6', desc:'Quick VIX/F&G/regime'},
    {id:'msft',     icon:'📈', label:'Review MSFT',       cmd:'portfolio review',                color:'#22c55e', desc:'Hold / take profit / exit?'},
    {id:'score',    icon:'🎯', label:'Score a Ticker',    cmd:'score ',                          color:'#f59e0b', desc:'Type ticker after pasting'},
    {id:'weekly',   icon:'📋', label:'Weekly Review',     cmd:'weekly review',                   color:'#a78bfa', desc:'7-question audit'},
    {id:'agents',   icon:'▶️', label:'Start Agents',      cmd:'start agents',                    color:'#94a3b8', desc:'Enable all 4 scans'},
  ];

  return(
    <Card className="p-4">
      <div className="text-xs font-bold uppercase tracking-wider text-gray-500 mb-3">
        Quick Commands — click to copy, paste in Claude
      </div>
      <div className="grid grid-cols-2 gap-2">
        {cmds.map(c=>{
          const isCopied=copied===c.id;
          return(
            <button key={c.id}
              onClick={()=>copy(c.id,c.cmd)}
              className="flex items-center gap-2 rounded-xl px-3 py-2.5 text-left transition-all"
              style={{
                background: isCopied?c.color+'30':'#0a0e1a',
                border:`1px solid ${isCopied?c.color:' #1e2d4a'}`,
              }}>
              <span className="text-lg flex-shrink-0">{c.icon}</span>
              <div className="min-w-0">
                <div className="text-xs font-bold"style={{color:isCopied?c.color:'#e2e8f0'}}>
                  {isCopied?'✓ Copied!':c.label}
                </div>
                <div className="text-xs text-gray-600 truncate">{c.desc}</div>
              </div>
            </button>
          );
        })}
      </div>
      <div className="text-xs text-gray-700 text-center mt-3">
        Paste the copied command into your Claude chat → hit Enter
      </div>
    </Card>
  );
}

// ─── DAILY BRIEF (main view) ──────────────────────────────────────────────

  const [manualFg,setManualFg]=useState('');

  const trades=load('inv_trades',DEMO_TRADES);
  const openTrades=trades.filter(t=>t.status==='Open');

  const refresh=useCallback(async()=>{
    setStatus('loading');setLive(null);
    const d=await fetchAllMarketData();
    const freshErrors=load('inv_errors',[]);
    setBannerErrors(freshErrors);
    if(!d.vix&&!d.spy&&!d.fg){setStatus('failed');}
    else{setLive({vix:d.vix,spy:d.spy,fg:d.fg});setStatus('done');setTs(new Date());}
  },[]);

  useEffect(()=>{refresh();},[]);

  // regime: prefer live data, fall back to manual entry
  const vixVal=live?.vix?.value||Number(manualVix)||null;
  const fgVal=live?.fg?.value||Number(manualFg)||null;
  const spyAbove=live?.spy?(live.spy.above):(spyTrend==='above');

  const mktStatus=()=>{
    const et=new Date(new Date().toLocaleString('en-US',{timeZone:'America/New_York'}));
    const m=et.getHours()*60+et.getMinutes(),d=et.getDay();
    if(d===0||d===6)return{l:'Weekend',c:'#475569'};
    if(m<9*60+30)return{l:'Pre-Market',c:'#f59e0b'};
    if(m<16*60)return{l:'Open',c:'#22c55e'};
    if(m<20*60)return{l:'After Hours',c:'#94a3b8'};
    return{l:'Closed',c:'#475569'};
  };
  const ms=mktStatus();

  const closed=trades.filter(t=>t.pnlPct!=null&&t.status!=='Open');
  const wins=closed.filter(t=>t.pnlPct>0);

  return(
    <div className="min-h-screen"style={{background:'#07090f'}}>

      {/* error banner — always on top */}
      <ErrorBanner
        errors={bannerErrors}
        onDismiss={()=>setBannerErrors([])}
      />

      {/* header */}

        style={{background:'#07090f',borderBottom:'1px solid #0d1120'}}>
        <div className="max-w-2xl mx-auto flex items-center justify-between">
          <div>
            <span className="font-black text-white tracking-tight">📈 Investment Terminal</span>
            <span className="text-xs text-gray-700 ml-2">Daniel</span>
          </div>
          <div className="flex items-center gap-3">
            <span className="text-xs font-semibold"style={{color:ms.c}}>● {ms.l}</span>
            <button onClick={refresh} disabled={status==='loading'}
              className="flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-xl"
              style={{background:'#0f1828',color:'#60a5fa',border:'1px solid #1e2d4a'}}>
              {status==='loading'?<><Spin/>Fetching…</>:'↻ Refresh'}
            </button>
          </div>
        </div>
        {/* 2 tabs only */}
        <div className="max-w-2xl mx-auto flex gap-2 mt-3">
          {window._tab==='journal'?
            <button onClick={()=>{window._tab='brief';window.location.reload()}}
              className="text-xs px-3 py-1.5 rounded-xl"
              style={{background:'#0f1828',color:'#6b7280',border:'1px solid #1e2d4a'}}>← Daily Brief</button>
            :null}
        </div>
      </div>

      <div className="px-4 py-4 max-w-2xl mx-auto space-y-4 pb-20">

        {/* ── regime banner ── */}
        {status==='loading'&&!regime&&(
          <Card className="p-5 flex items-center gap-3">
            <Spin/><span className="text-sm text-gray-400">Fetching live market data…</span>
          </Card>
        )}

        {status==='failed'&&!regime&&(
          <Card className="p-4"style={{border:'1px solid #f59e0b22'}}>
            <div className="text-xs font-bold text-amber-400 mb-2">⚡ Live data unavailable — enter manually</div>
            <p className="text-xs text-gray-500 mb-3">The app needs to be hosted online for auto-fetch. Enter today's readings to get your analysis.</p>
            <div className="grid grid-cols-3 gap-2">
              <div>
                <label className="text-xs text-gray-500 block mb-1">VIX</label>
                <input type="number" placeholder="e.g. 18.4" value={manualVix}
                  onChange={e=>setManualVix(e.target.value)} className="w-full px-2 py-1.5 text-sm"/>
              </div>
              <div>
                <label className="text-xs text-gray-500 block mb-1">Fear & Greed</label>
                <input type="number" placeholder="e.g. 49" value={manualFg}
                  onChange={e=>setManualFg(e.target.value)} className="w-full px-2 py-1.5 text-sm"/>
              </div>
              <div>
                <label className="text-xs text-gray-500 block mb-1">SPY vs 50 EMA</label>
                <select value={spyTrend} onChange={e=>setSpyTrend(e.target.value)}
                  className="w-full px-2 py-1.5 text-sm">
                  <option value="above">Above</option>
                  <option value="below">Below</option>
                </select>
              </div>
            </div>
            <div className="mt-2 text-xs text-gray-600">
              Check: <a href="https://finance.yahoo.com/quote/%5EVIX" target="_blank" className="text-blue-500">VIX ↗</a>
              {' · '}<a href="https://cnn.com/markets/fear-and-greed" target="_blank" className="text-blue-500">Fear & Greed ↗</a>
            </div>
          </Card>
        )}

        {regime&&(
          <Card className="p-5 fade"style={{border:`2px solid ${regime.color}44`,background:`linear-gradient(135deg,${regime.color}0a,#0d1120)`}}>
            <div className="flex items-start justify-between gap-3 mb-3">
              <div>
                <div className="text-xl font-black mb-1"style={{color:regime.color}}>
                  {regime.icon} {regime.name}
                </div>
                <div className="text-base font-semibold text-gray-200">{regime.headline}</div>
              </div>
              {ts&&<div className="text-xs text-gray-700 flex-shrink-0">{ts.toLocaleTimeString()}</div>}
            </div>

            {/* plain-English reasoning */}
            <div className="rounded-xl p-3 mb-3"style={{background:'#07090f88'}}>
              <div className="text-xs font-bold text-gray-500 mb-1">WHY</div>
              <div className="text-sm text-gray-300 leading-relaxed">{regime.why}</div>
            </div>

            {/* what to do */}
            <div className="rounded-xl p-3 mb-3"style={{background:`${regime.color}12`}}>
              <div className="text-xs font-bold mb-1"style={{color:regime.color}}>WHAT TO DO</div>
              <div className="text-sm text-gray-200 leading-relaxed">{regime.action}</div>
            </div>

            {/* 3 numbers */}
            <div className="flex gap-3 flex-wrap">
              {[
                {l:'VIX',v:live?.vix?fmt(live.vix.value):manualVix||'—',
                 sub:live?.vix?(live.vix.change>0?`▲ ${fmt(live.vix.pct)}%`:`▼ ${fmt(Math.abs(live.vix.pct))}%`):'manual entry',
                 c:live?.vix?(live.vix.value<18?'#22c55e':live.vix.value<25?'#6366f1':live.vix.value<30?'#f59e0b':'#ef4444'):'#94a3b8'},
                {l:'Fear & Greed',v:live?.fg?live.fg.value:manualFg||'—',
                 sub:live?.fg?(live.fg.label+(live.fg.source==='vix-proxy'?' (est. from VIX)':'')):'manual entry',
                 c:live?.fg?(live.fg.value<30?'#ef4444':live.fg.value<45?'#f97316':live.fg.value<55?'#f59e0b':live.fg.value<70?'#22c55e':'#84cc16'):'#94a3b8'},
                {l:'SPY vs 50 EMA',v:live?.spy?`$${fmt(live.spy.price,0)}`:spyAbove?'Above':'Below',
                 sub:live?.spy?(live.spy.above?`+${fmt(live.spy.pctAbove)}% above`:` ${fmt(live.spy.pctAbove)}% below`):(spyAbove?'manual entry':'manual entry'),
                 c:live?.spy?(live.spy.above?'#22c55e':'#ef4444'):(spyAbove?'#22c55e':'#ef4444')},
              ].map((s,i)=>(
                <div key={i} className="flex-1 min-w-0">
                  <div className="text-xs text-gray-500">{s.l}</div>
                  <div className="font-black text-xl"style={{color:s.c}}>{s.v}</div>
                  <div className="text-xs"style={{color:s.c+'bb'}}>{s.sub}</div>
                </div>
              ))}
            </div>
          </Card>
        )}

        {/* ── open positions ── */}
        {openTrades.length>0&&(
          <Card>
            <div className="px-4 py-3 text-xs font-bold uppercase tracking-wider text-gray-500"
              style={{borderBottom:'1px solid #0f1828'}}>
              Open Positions — tap "Why?" to see full analysis
            </div>
            {openTrades.map(t=>(
              <PositionCard key={t.id} t={t} regime={regime} live={live}/>
            ))}
          </Card>
        )}

        {/* ── portfolio summary ── */}
        <Card className="p-4">
          <div className="text-xs font-bold uppercase tracking-wider text-gray-500 mb-3">Portfolio</div>
          <div className="grid grid-cols-4 gap-3 text-center">
            {(()=>{
              const winRate=closed.length?Math.round(wins.length/closed.length*100):0;
              const totalPnl=closed.reduce((s,t)=>s+t.pnlPct,0);
              return[
                {l:'Win Rate',v:`${winRate}%`,c:winRate>=55?'#22c55e':winRate>=45?'#f59e0b':'#ef4444'},
                {l:'Total P&L',v:`${totalPnl>=0?'+':''}${totalPnl.toFixed(1)}%`,c:totalPnl>=0?'#22c55e':'#ef4444'},
                {l:'Open',v:openTrades.length,c:'#60a5fa'},
                {l:'Trades',v:closed.length,c:'#94a3b8'},
              ];
            })().map((s,i)=>(
              <div key={i}>
                <div className="text-xs text-gray-600 mb-1">{s.l}</div>
                <div className="font-black text-base"style={{color:s.c}}>{s.v}</div>
              </div>
            ))}
          </div>
          <button onClick={()=>{window._tab='journal';window._openJournal&&window._openJournal();}}
            className="w-full mt-3 py-2 rounded-xl text-xs font-semibold text-indigo-400"
            style={{background:'#0f1828',border:'1px solid #1e2d4a'}}>
            View full journal & P&L chart →
          </button>
        </Card>

        {/* ── quick commands ── */}
        <QuickCommands/>

        {/* ── what to do next ── */}
        <Card>
          <div className="px-4 py-3 text-xs font-bold uppercase tracking-wider text-gray-500"
            style={{borderBottom:'1px solid #0f1828'}}>
            Signal Sources
          </div>
          {[
            {icon:'🏛️',title:'Capitol Trades',desc:'Congress member buys — cluster buys near legislation = strong signal',color:'#f59e0b',url:'https://www.capitoltrades.com'},
            {icon:'🔍',title:'Finviz MR Screener',desc:'RSI<10 stocks above 200 EMA — paste tickers into Claude for scoring',color:'#3b82f6',url:'https://finviz.com/screener.ashx?v=111&f=rsi_os10,ma200_pa,cap_midover&o=-rsi'},
            {icon:'😱',title:'CNN Fear & Greed',desc:'Current market sentiment 0–100',color:'#6366f1',url:'https://cnn.com/markets/fear-and-greed'},
            {icon:'🌍',title:'World Monitor',desc:'Geopolitical risk — escalation = reduce exposure',color:'#94a3b8',url:'https://worldmonitor.app'},
          ].map((a,i)=>(
            <div key={i} className="flex items-start gap-3 px-4 py-3"
              style={{borderTop:'1px solid #0f1828',background:'#0a0e1a'}}>
              <span className="text-xl mt-0.5">{a.icon}</span>
              <div className="flex-1 min-w-0">
                <div className="text-sm font-bold mb-0.5"style={{color:a.color}}>{a.title}</div>
                <div className="text-xs text-gray-500 leading-relaxed">{a.desc}</div>
                <a href={a.url} target="_blank" rel="noreferrer"
                  className="text-xs text-blue-500 mt-1 inline-block">Open ↗</a>
              </div>
            </div>
          ))}
        </Card>

        {/* ── phase tracker ── */}
        <Card className="p-4">
          <div className="text-xs font-bold uppercase tracking-wider text-gray-500 mb-3">Where You Are</div>
          <div className="space-y-2">
            {[
              {n:0,l:'Setup & config',done:true,d:'Databases, dashboard, skill, agents ✅'},
              {n:1,l:'Paper trading — 4 weeks',active:true,d:'Target: 20+ trades · Win rate >50% · All rules followed · 0 real money'},
              {n:2,l:'Small capital (10%)',d:'After Phase 1 passes. Max 1% position size.'},
              {n:3,l:'Growing capital (40%)',d:'After Phase 2. Standard sizing.'},
              {n:4,l:'Full deployment',d:'Full capital. All systems live.'},
            ].map((p,i)=>(
              <div key={i} className="flex items-start gap-3">
                <div className="w-6 h-6 rounded-full flex-shrink-0 flex items-center justify-center text-xs font-bold mt-0.5"
                  style={{background:p.done?'#22c55e':p.active?'#6366f1':'#1e2d4a',
                    color:p.done||p.active?'#fff':'#475569'}}>
                  {p.done?'✓':p.n}
                </div>
                <div className="min-w-0">
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className="text-sm font-semibold"style={{color:p.done?'#22c55e':p.active?'#a5b4fc':'#4b5563'}}>
                      Phase {p.n}: {p.l}
                    </span>
                    {p.active&&<Pill text="YOU ARE HERE" color="#6366f1"/>}
                  </div>
                  <div className="text-xs text-gray-600 mt-0.5">{p.d}</div>
                </div>
              </div>
            ))}
          </div>
        </Card>

      </div>
    </div>
  );
}

// ─── JOURNAL (second view) ───────────────────────────────────────────────
function Journal({onBack}){
  const [trades,setTrades]=useState(()=>{
    const s=load('inv_trades',null);
    if(!s){save('inv_trades',DEMO_TRADES);return DEMO_TRADES;}return s;
  });
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({ticker:'',strategy:'Mean Reversion',status:'Paper',
    dateOpened:todayStr(),dateClosed:'',score:'',entryPrice:'',stopLoss:'',exitPrice:'',
    rulesFollowed:true,right:'',lesson:''});
  const canvasRef=useRef(null);const chartRef=useRef(null);

  const closed=trades.filter(t=>t.pnlPct!=null&&t.status!=='Open');
  const wins=closed.filter(t=>t.pnlPct>0);
  const losses=closed.filter(t=>t.pnlPct<=0);
  const stats={
    winRate:closed.length?Math.round(wins.length/closed.length*100):0,
    avgWin:wins.length?(wins.reduce((s,t)=>s+t.pnlPct,0)/wins.length).toFixed(1):0,
    avgLoss:losses.length?(losses.reduce((s,t)=>s+t.pnlPct,0)/losses.length).toFixed(1):0,
    total:closed.reduce((s,t)=>s+t.pnlPct,0).toFixed(1),
    compliance:trades.length?Math.round(trades.filter(t=>t.rulesFollowed).length/trades.length*100):100,
  };

  useEffect(()=>{
    const sorted=[...closed].sort((a,b)=>new Date(a.dateOpened)-new Date(b.dateOpened));
    if(!canvasRef.current||!sorted.length)return;
    if(chartRef.current){chartRef.current.destroy();}
    let cum=0;const cums=sorted.map(t=>{cum+=t.pnlPct;return parseFloat(cum.toFixed(2));});
    chartRef.current=new Chart(canvasRef.current,{
      type:'bar',
      data:{labels:sorted.map(t=>t.ticker),datasets:[
        {type:'line',label:'Cumulative %',data:cums,borderColor:'#6366f1',borderWidth:2,
         pointRadius:4,pointBackgroundColor:'#6366f1',fill:true,
         backgroundColor:'rgba(99,102,241,0.07)',tension:0.3,yAxisID:'y2'},
        {type:'bar',label:'Trade %',data:sorted.map(t=>parseFloat(t.pnlPct.toFixed(2))),
         backgroundColor:sorted.map(t=>t.pnlPct>0?'rgba(34,197,94,0.6)':'rgba(239,68,68,0.6)'),
         yAxisID:'y1'},
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{
          x:{ticks:{color:'#475569',font:{size:9}},grid:{color:'#0f1828'}},
          y1:{type:'linear',position:'left',ticks:{color:'#94a3b8',font:{size:9},callback:v=>`${v>0?'+':''}${v}%`},grid:{color:'#0f1828'}},
          y2:{type:'linear',position:'right',ticks:{color:'#6366f1',font:{size:9},callback:v=>`${v>0?'+':''}${v}%`},grid:{drawOnChartArea:false}},
        },
      },
    });
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[trades]);

  const setF=(k,v)=>setForm(p=>({...p,[k]:v}));
  const saveTrade=()=>{
    if(!form.ticker.trim())return;
    const pnlPct=form.exitPrice&&form.entryPrice
      ?((Number(form.exitPrice)-Number(form.entryPrice))/Number(form.entryPrice)*100):null;
    const t={...form,id:Date.now(),ticker:form.ticker.toUpperCase(),pnlPct};
    const u=[t,...trades];setTrades(u);save('inv_trades',u);setShowForm(false);
    // Auto-sync to Notion Trade Journal (silent, non-blocking)
    if(window.location.protocol!=='file:'){
      fetch('/api/log-trade',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify(t)}).catch(()=>{});
    }
  };
  const del=id=>{if(!confirm('Delete?'))return;const u=trades.filter(t=>t.id!==id);setTrades(u);save('inv_trades',u);};

  return(
    <div className="min-h-screen"style={{background:'#07090f'}}>
      <div className="sticky top-0 z-20 px-4 pt-4 pb-3"style={{background:'#07090f',borderBottom:'1px solid #0d1120'}}>
        <div className="max-w-2xl mx-auto flex items-center justify-between">
          <button onClick={onBack} className="flex items-center gap-1.5 text-sm font-semibold text-indigo-400">
            ← Daily Brief
          </button>
          <span className="font-black text-white">Trade Journal</span>
          <div className="w-20"/>
        </div>
      </div>

      <div className="px-4 py-4 max-w-2xl mx-auto space-y-4 pb-20">

        {/* stats */}
        <div className="grid grid-cols-5 gap-2">
          {[
            {l:'Win Rate',v:`${stats.winRate}%`,c:stats.winRate>=55?'#22c55e':'#f59e0b'},
            {l:'Avg Win',v:`+${stats.avgWin}%`,c:'#22c55e'},
            {l:'Avg Loss',v:`${stats.avgLoss}%`,c:'#ef4444'},
            {l:'Total P&L',v:`${stats.total>=0?'+':''}${stats.total}%`,c:stats.total>=0?'#22c55e':'#ef4444'},
            {l:'Rules',v:`${stats.compliance}%`,c:stats.compliance>=90?'#22c55e':'#f59e0b'},
          ].map((s,i)=>(
            <Card key={i} className="p-2.5 text-center">
              <div className="text-xs text-gray-600 mb-1">{s.l}</div>
              <div className="font-black text-sm"style={{color:s.c}}>{s.v}</div>
            </Card>
          ))}
        </div>

        {/* chart */}
        <Card className="p-4"style={{height:220}}>
          <canvas ref={canvasRef} style={{maxHeight:188}}/>
        </Card>

        {/* log button */}
        <button onClick={()=>setShowForm(!showForm)}
          className="w-full py-2.5 rounded-2xl text-sm font-bold text-white"
          style={{background:showForm?'#374151':'#1d4ed8'}}>
          {showForm?'✕ Cancel':'+ Log Trade'}
        </button>

        {showForm&&(
          <Card className="p-4 space-y-3">
            <div className="grid grid-cols-2 gap-3">
              {[{l:'Ticker',k:'ticker',t:'text'},{l:'Date Opened',k:'dateOpened',t:'date'},
                {l:'Composite Score',k:'score',t:'number'},{l:'Entry Price ($)',k:'entryPrice',t:'number'},
                {l:'Stop-Loss ($)',k:'stopLoss',t:'number'},{l:'Exit Price ($)',k:'exitPrice',t:'number'},
              ].map(f=>(
                <div key={f.k}>
                  <label className="text-xs text-gray-500 block mb-1">{f.l}</label>
                  <input type={f.t} value={form[f.k]} onChange={e=>setF(f.k,e.target.value)}
                    className="w-full px-3 py-2 text-sm"/>
                </div>
              ))}
              <div>
                <label className="text-xs text-gray-500 block mb-1">Strategy</label>
                <select value={form.strategy} onChange={e=>setF('strategy',e.target.value)} className="w-full px-3 py-2 text-sm">
                  <option>Mean Reversion</option><option>Breakout Momentum</option><option>Earnings Catalyst</option>
                </select>
              </div>
              <div>
                <label className="text-xs text-gray-500 block mb-1">Status</label>
                <select value={form.status} onChange={e=>setF('status',e.target.value)} className="w-full px-3 py-2 text-sm">
                  <option>Open</option><option>Closed</option><option>Paper</option>
                </select>
              </div>
            </div>
            {[{l:'Why did you enter? (signals)',k:'right'},{l:'Lesson learned',k:'lesson'}].map(f=>(
              <div key={f.k}>
                <label className="text-xs text-gray-500 block mb-1">{f.l}</label>
                <textarea value={form[f.k]} onChange={e=>setF(f.k,e.target.value)}
                  className="w-full px-3 py-2 text-xs resize-none"rows={2}/>
              </div>
            ))}
            <label className="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" checked={form.rulesFollowed}
                onChange={e=>setF('rulesFollowed',e.target.checked)} className="w-4 h-4"/>
              <span className="text-xs text-gray-400">All rules followed</span>
            </label>
            <button onClick={saveTrade}
              className="w-full py-2.5 rounded-2xl text-sm font-bold text-white"style={{background:'#1d4ed8'}}>
              Save
            </button>
          </Card>
        )}

        {/* trades list */}
        <div className="space-y-2">
          {trades.map(t=>(
            <Card key={t.id} className="p-3">
              <div className="flex justify-between items-start">
                <div className="flex items-center gap-2 flex-wrap">
                  <span className="font-black text-base text-white">{t.ticker}</span>
                  <span className="text-xs text-gray-600">{t.strategy}</span>
                  <span className="text-xs px-1.5 py-0.5 rounded-full"
                    style={{background:t.status==='Open'?'#14532d':t.status==='Paper'?'#1e3a5f':'#1f2937',
                      color:t.status==='Open'?'#4ade80':t.status==='Paper'?'#60a5fa':'#9ca3af'}}>
                    {t.status}
                  </span>
                  {t.score&&<Pill text={`${t.score}/100`} color={t.score>=80?'#22c55e':t.score>=65?'#84cc16':'#f59e0b'}/>}
                </div>
                <div className="flex items-center gap-2 flex-shrink-0">
                  {t.pnlPct!=null&&(
                    <span className="font-black text-lg"style={{color:t.pnlPct>0?'#22c55e':'#ef4444'}}>
                      {t.pnlPct>0?'+':''}{t.pnlPct.toFixed(1)}%
                    </span>
                  )}
                  <button onClick={()=>del(t.id)} className="text-xs text-gray-700 hover:text-red-500">✕</button>
                </div>
              </div>
              <div className="flex flex-wrap gap-3 text-xs text-gray-600 mt-1">
                {t.entryPrice&&<span>In: ${t.entryPrice}</span>}
                {t.exitPrice&&<span>Out: ${t.exitPrice}</span>}
                {t.stopLoss&&<span>SL: ${t.stopLoss}</span>}
                <span>{t.dateOpened}</span>
              </div>
              {!t.rulesFollowed&&<div className="text-xs text-red-500 mt-1">⚠️ Rules violated</div>}
              {t.lesson&&<div className="text-xs text-indigo-400 mt-1">💡 {t.lesson}</div>}
            </Card>
          ))}
        </div>

      </div>
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────
function App(){
  const [view,setView]=useState('brief');
  window._openJournal=()=>setView('journal');
  if(view==='journal')return<Journal onBack={()=>setView('brief')}/>;
  return<DailyBrief/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
