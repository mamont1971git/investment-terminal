const save=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};

// ─── error logging — saves locally + auto-pushes to Notion via API ──────────
function logError(type,message,context={}){
  const entry={
    id:Date.now(),
    ts:new Date().toISOString(),
    type,
    message:String(message),
    context:JSON.stringify(context),
    protocol:window.location.protocol,
  };
  const existing=load('inv_errors',[]);
  const updated=[entry,...existing].slice(0,100);
  save('inv_errors',updated);
  console.error('[InvTerminal]',type,message,context);
  // Auto-push to Notion via serverless API (silent, non-blocking)
  if(window.location.protocol!=='file:'){
    fetch('/api/log-error',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify([{type,message:String(message),context:JSON.stringify(context),
        ts:entry.ts,protocol:window.location.protocol}])
    }).catch(()=>{});
  }
  return entry;
}

// ─── live data — single call to our Vercel serverless API ────────────────
// All market fetching now happens server-side (no CORS issues)
async function fetchAllMarketData(){
  try{
    const isLocal = window.location.protocol === 'file:';
    if(isLocal) throw new Error('Running as local file — open the hosted URL to get live data');
    const r = await Promise.race([
      fetch('/api/market-data'),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout after 10s')),10000))
    ]);
    if(!r.ok) throw new Error(`API returned ${r.status}`);
    const d = await r.json();
    // Log server-side errors (skip info messages and expected VIX proxy fallback)
    if(d.errors){
      Object.entries(d.errors).forEach(([k,v])=>{
        if(v && !k.includes('_info') && !v.includes('VIX proxy')){
          logError('FETCH_'+k.toUpperCase(), 'Server: '+v, {source:'api/market-data'});
        }
      });
    }
    return d; // {vix, spy, fg, ts, errors}
  }catch(e){
    logError('FETCH_ALL', e.message||'Failed to call /api/market-data', {protocol:window.location.protocol});
    return {vix:null, spy:null, fg:null};
  }
}

function getRegime(vix,fg,spyAbove){
  if(vix>30||fg>80)return{
    name:'CAUTION ZONE',color:'#ef4444',icon:'⚠️',
    headline:'Stay mostly in cash. Protect what you have.',
    why:`VIX at ${fmt(vix)} signals elevated fear${fg>80?' and F&G above 80 means extreme greed — a dangerous combo':''}.`,
    action:'Reduce all positions to 50% exposure. Only enter if composite score ≥ 75. No new breakout trades.',
  };
  if(fg<20)return{
    name:'EXTREME FEAR',color:'#f97316',icon:'😱',
    headline:'Potential mean reversion bounce — tiny positions only.',
    why:`F&G at ${fg} is extreme fear territory. Historically this is where oversold bounces start, but it can get worse before it gets better.`,
    action:'1–2% position sizes maximum. Only RSI(2) < 5 setups on the strongest fundamentals.',
  };
  if(vix<18&&fg>55&&spyAbove)return{
    name:'BREAKOUT ZONE',color:'#22c55e',icon:'🚀',
    headline:'Trending market — chase volume-confirmed breakouts.',
    why:`VIX at ${fmt(vix)} (low fear), F&G at ${fg} (greed building), SPY above its 50-day trend line. This is a bull mode.`,
    action:'Deploy Strategy B. Buy breakouts above resistance on 1.5× average volume. 2–3% position size.',
  };
  return{
    name:'MEAN REVERSION ZONE',color:'#6366f1',icon:'🔄',
    headline:'Range-bound market — buy quality stocks that have pulled back.',
    why:`VIX at ${fmt(vix)} (moderate fear) and F&G at ${fg} — neither panicking nor euphoric. This is the ideal condition to buy oversold dips on strong stocks.`,
    action:'Deploy Strategy A. Look for RSI(2) < 10 on stocks above their 200-day EMA. 2–4% position size.',
  };
}

function OrderDrafts(){
  const [drafts,setDrafts]=useState([]);
  const [loading,setLoading]=useState(true);
  const [acting,setActing]=useState(null);
  const mode=load('tradingMode','dry-run');

  const fetchDrafts=useCallback(async()=>{
    if(window.location.protocol==='file:'){setLoading(false);return;}
    try{
      const r=await fetch('/api/get-drafts');
      const d=await r.json();
      setDrafts(d.drafts||[]);
    }catch{}finally{setLoading(false);}
  },[]);

  useEffect(()=>{fetchDrafts();},[]);
  // Poll every 30s if drafts exist
  useEffect(()=>{
    if(!drafts.length)return;
    const t=setInterval(fetchDrafts,30000);
    return()=>clearInterval(t);
  },[drafts.length,fetchDrafts]);
  // Listen for refreshDrafts event (fired when a BUY draft is created from analysis)
  useEffect(()=>{
    const h=()=>{setTimeout(fetchDrafts,1000);};
    window.addEventListener('refreshDrafts',h);
    return()=>window.removeEventListener('refreshDrafts',h);
  },[fetchDrafts]);

  const act=async(notionId,action)=>{
    setActing(notionId+action);
    try{
      const r=await fetch('/api/confirm-draft',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({notionId,action,mode}),
      });
      const d=await r.json();
      if(d.action==='ibkr-not-connected'){
        alert('IBKR not yet connected.\n\n'+d.message+'\n\nSwitching to Dry Run.');
        save('tradingMode','dry-run');
      }
      if(d.action==='wallet-blocked'){
        alert('💰 INSUFFICIENT FUNDS\n\n'+d.message);
        return;
      }
      await fetchDrafts();
      // Refresh positions so newly confirmed trades appear in holdings
      window.dispatchEvent(new Event('refreshDrafts'));
    }catch(e){alert('Error: '+e.message);}
    finally{setActing(null);}
  };

  if(loading||!drafts.length)return null;

  return(
    <Card style={{border:'2px solid #f59e0b44'}}>
      <div className="px-4 py-3 flex items-center justify-between"
        style={{borderBottom:'1px solid #0f1828',background:'#1a1200'}}>
        <div className="flex items-center gap-2">
          <span className="text-amber-400 text-lg">⏳</span>
          <span className="text-xs font-bold text-amber-300 uppercase tracking-wider">
            {drafts.length} Order Draft{drafts.length>1?'s':''} — Awaiting Your Decision
          </span>
        </div>
        <TradingModeSelector/>
      </div>
      {drafts.map(d=>{
        const isActing=acting&&acting.startsWith(d.id);
        const modeLabel=mode==='dry-run'?'Paper Trade':'IBKR Order';
        return(
          <div key={d.id} className="px-4 py-4"style={{borderTop:'1px solid #0f1828',background:'#0e0c00'}}>
            {/* Header row */}
            <div className="flex items-start justify-between gap-3 mb-3">
              <div>
                <div className="flex items-center gap-2 flex-wrap">
                  <span className="font-black text-xl text-white">{d.ticker}</span>
                  <span className="text-xs text-gray-500">{d.strategy}</span>
                  {d.score&&<Pill text={`Score ${d.score}`}
                    color={d.score>=80?'#22c55e':d.score>=65?'#84cc16':'#f59e0b'}/>}
                  {d.regime&&<Pill text={d.regime} color="#6366f1"/>}
                </div>
                {d.reasoning&&<div className="text-xs text-gray-400 mt-1 leading-relaxed">{d.reasoning}</div>}
              </div>
            </div>
            {/* Price grid */}
            <div className="grid grid-cols-4 gap-2 mb-4">
              {[
                {l:'Entry',v:`$${d.entryPrice}`,bg:'#0f1828',c:'#e2e8f0'},
                {l:'Stop –7%',v:`$${d.stop}`,bg:'#1a0c0c',c:'#f87171'},
                {l:'TP1 +8%',v:`$${d.tp1}`,bg:'#0a1a0d',c:'#4ade80'},
                {l:'TP2 +15%',v:`$${d.tp2}`,bg:'#0a1a0d',c:'#22c55e'},
              ].map((b,i)=>(
                <div key={i} className="rounded-xl p-2 text-center"style={{background:b.bg}}>
                  <div className="text-xs text-gray-600">{b.l}</div>
                  <div className="font-bold text-sm mt-0.5"style={{color:b.c}}>{b.v}</div>
                </div>
              ))}
            </div>
            {/* Action buttons */}
            <div className="flex gap-3">
              <button onClick={()=>act(d.id,'confirm')} disabled={!!isActing}
                className="flex-1 py-3 rounded-2xl font-bold text-sm transition-all"
                style={{background:isActing==='confirm'?'#14532d':'#22c55e',color:'#000',
                  opacity:isActing?0.7:1}}>
                ✅ Confirm — {modeLabel}
              </button>
              <button onClick={()=>act(d.id,'reject')} disabled={!!isActing}
                className="px-5 py-3 rounded-2xl font-bold text-sm"
                style={{background:'#1a0c0c',color:'#f87171',border:'1px solid #7f1d1d',
                  opacity:isActing?0.7:1}}>
                ❌ Reject
              </button>
            </div>
            <div className="text-xs text-center mt-2"style={{color:'#4b5563'}}>
              Mode: <span style={{color:mode==='dry-run'?'#818cf8':'#22c55e'}}>{mode==='dry-run'?'Dry Run (paper trade)':'IBKR (real order)'}</span>
            </div>
          </div>
        );
      })}
    </Card>
  );
}

// ─── POSITION CARD — interactive with close actions + profit display ──────
function PositionCard({t,pnl,recColor,tp1,tp2,tp3,shares,posValue,posPct,currentProfit,tp1Profit,tp2Profit,tp3Profit,stopLossProfit,onClose}){
  const [closing,setClosing]=useState(null); // which action is in-flight
  const [closed,setClosed]=useState(false);
  const [closeResult,setCloseResult]=useState(null);
  const [showAllActions,setShowAllActions]=useState(false);

  const handleClose=async(action,label)=>{
    if(!confirm(`${label} for ${t.ticker}?\n\nThis will close the position in Notion.`))return;
    setClosing(action);
    try{
      const r=await fetch('/api/close-position',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          notionId:t.id,action,ticker:t.ticker,
          entryPrice:t.entryPrice,dateOpened:t.dateOpened,strategy:t.strategy
        })
      });
      const d=await r.json();
      if(d.ok){
        setClosed(true);
        setCloseResult(d.closed);
        // refresh positions after short delay
        setTimeout(()=>{onClose&&onClose();},1500);
      }else{
        alert('Failed to close: '+(d.error||'unknown error'));
      }
    }catch(e){alert('Error: '+e.message);}
    finally{setClosing(null);}
  };

  if(closed&&closeResult){
    return(
      <div style={{borderTop:'1px solid #0f1828',background:closeResult.pnlPct>0?'#0a1a0d':'#1a0808'}}>
        <div className="px-4 py-4 text-center">
          <div className="text-2xl mb-1">{closeResult.pnlPct>0?'✅':'❌'}</div>
          <div className="font-black text-white text-lg mb-1">{t.ticker} — {closeResult.closeReason}</div>
          <div className="text-sm font-bold mb-2"style={{color:closeResult.pnlPct>0?'#22c55e':'#ef4444'}}>
            {closeResult.pnlPct>0?'+':''}{fmt(closeResult.pnlPct,2)}%
            {closeResult.exitPrice&&closeResult.entryPrice&&shares>0&&(
              <span className="ml-2 text-xs">
                (~{closeResult.pnlPct>0?'+':''}${fmt((closeResult.exitPrice-closeResult.entryPrice)*shares,0)})
              </span>
            )}
          </div>
          <div className="text-xs text-gray-500">
            Entry ${fmt(closeResult.entryPrice)} → Exit ${fmt(closeResult.exitPrice)} · {closeResult.daysHeld} days held
          </div>
        </div>
      </div>
    );
  }

  const [showDetails,setShowDetails]=useState(false);
  const tp1Pct=t.entryPrice?((tp1-t.entryPrice)/t.entryPrice*100):null;
  const tp2Pct=t.entryPrice?((tp2-t.entryPrice)/t.entryPrice*100):null;
  const stopPct=t.entryPrice&&t.stopLoss?((t.stopLoss-t.entryPrice)/t.entryPrice*100):null;

  // ── SMART VERDICT (computed once, used in header pill + action section) ──
  const _price=t.currentPrice, _entry=t.entryPrice, _stop=t.stopLoss, _rec=t.recommendation;
  const _toTp1=_price&&tp1?((tp1-_price)/_price*100):null;
  const _toTp2=_price&&tp2?((tp2-_price)/_price*100):null;
  const _toStop=_price&&_stop?((_price-_stop)/_price*100):null;
  const _aboveEntry=_price&&_entry?((_price-_entry)/_entry*100):null;
  const _hasEarnings=!!(t.right&&/earnings?/i.test(t.right));
  let _earningsDays=null;
  if(_hasEarnings){
    const em=t.right&&t.right.match(/earnings?\s*(?:on|in|:)?\s*(\w+\s+\d+|\d+\s+days?)/i);
    if(em){const dm=em[1].match(/(\d+)\s*days?/i);if(dm)_earningsDays=parseInt(dm[1]);
    else{try{const ed=new Date(em[1]+' 2026');if(!isNaN(ed))_earningsDays=Math.max(0,Math.ceil((ed-new Date())/86400000));}catch(e){}}}
  }
  const _earningsWarn=_earningsDays!=null?` Earnings in ${_earningsDays} day${_earningsDays!==1?'s':''}.`:(_hasEarnings?' Earnings approaching.':'');

  let verdict,verdictIcon,verdictColor,verdictBg,verdictBorder,verdictReason,primaryAction,primaryLabel;
  if(!_price||!_entry){
    verdict='NO DATA';verdictIcon='⚠️';verdictColor='#94a3b8';verdictBg='#0f1828';verdictBorder='#1e2d4a';
    verdictReason='Waiting for price data';primaryAction=null;primaryLabel='';
  } else if(_price<=_stop*1.005){
    verdict='SELL NOW';verdictIcon='🚨';verdictColor='#ef4444';verdictBg='#1a0808';verdictBorder='#7f1d1d';
    verdictReason='Stop loss hit. Close this position now.';
    primaryAction='stopped_out';primaryLabel=`Close @ $${fmt(_stop)}`;
  } else if(_price>=tp2*0.995){
    verdict='SELL NOW — TARGET HIT';verdictIcon='💰';verdictColor='#22c55e';verdictBg='#0a1a0d';verdictBorder='#14532d';
    verdictReason=`TP2 reached. You're up +${fmt(_aboveEntry,1)}% (+$${fmt(currentProfit,0)}). Take the money.${_earningsWarn}`;
    primaryAction='take_profit_2';primaryLabel=`Take Profit +$${fmt(currentProfit,0)}`;
  } else if(_price>=tp1*0.995){
    verdict='SELL NOW — TARGET HIT';verdictIcon='💰';verdictColor='#22c55e';verdictBg='#0a1a0d';verdictBorder='#14532d';
    verdictReason=`TP1 reached. You're up +${fmt(_aboveEntry,1)}% (+$${fmt(currentProfit,0)}). Take the money.${_earningsWarn}`;
    primaryAction='take_profit_1';primaryLabel=`Take Profit +$${fmt(currentProfit,0)}`;
  } else if(_rec==='EXIT_NOW'||_rec==='SELL'){
    verdict='SELL NOW';verdictIcon='⚠️';verdictColor='#f59e0b';verdictBg='#1a0c08';verdictBorder='#78350f';
    verdictReason=t.right?t.right.slice(0,120):'Exit signal triggered.';
    primaryAction='exit_now';primaryLabel=`Exit @ $${fmt(_price)}`;
  } else if(_rec==='TAKE_PROFIT'){
    if(_hasEarnings){
      verdict='WATCH CLOSELY';verdictIcon='⚠️';verdictColor='#f59e0b';verdictBg='#1a0c08';verdictBorder='#78350f';
      verdictReason=`Up +${fmt(_aboveEntry,1)}% but target not reached.${_earningsWarn} Decide before earnings.`;
    } else {
      verdict='WATCH CLOSELY';verdictIcon='⚠️';verdictColor='#f59e0b';verdictBg='#1a0c08';verdictBorder='#78350f';
      verdictReason=`Up +${fmt(_aboveEntry,1)}% (+$${fmt(currentProfit,0)}). Analysis suggests taking profit but target not hit. Watch for ${fmt(_toTp1,1)}% more to TP1.`;
    }
    primaryAction='exit_now';primaryLabel=`Exit @ $${fmt(_price)} (+$${fmt(currentProfit,0)})`;
  } else if(_toStop!=null&&_toStop<3){
    verdict='WATCH CLOSELY';verdictIcon='⚠️';verdictColor='#f59e0b';verdictBg='#1a0c08';verdictBorder='#78350f';
    verdictReason=`Only ${fmt(_toStop,1)}% above your stop. Be ready to exit.${_earningsWarn}`;
    primaryAction='exit_now';primaryLabel=`Exit Now @ $${fmt(_price)}`;
  } else if(_hasEarnings&&_earningsDays!=null&&_earningsDays<=3){
    verdict='WATCH CLOSELY';verdictIcon='⚠️';verdictColor='#f59e0b';verdictBg='#1a0c08';verdictBorder='#78350f';
    verdictReason=_aboveEntry>=0
      ?`Up +${fmt(_aboveEntry,1)}%. Earnings in ${_earningsDays} day${_earningsDays!==1?'s':''}. Decide: lock in gains or hold through.`
      :`Down ${fmt(Math.abs(_aboveEntry),1)}%. Earnings in ${_earningsDays} day${_earningsDays!==1?'s':''}. Risk of further drop.`;
    primaryAction=null;primaryLabel='';
  } else if(_aboveEntry>=0){
    verdict='DO NOTHING';verdictIcon='✅';verdictColor='#60a5fa';verdictBg='#0c1425';verdictBorder='#1e3a5f';
    verdictReason=_toTp1!=null?`Up +${fmt(_aboveEntry,1)}%. Target is ${fmt(_toTp1,1)}% away. Let it run.`:`Up +${fmt(_aboveEntry,1)}%. Let it run.`;
    primaryAction=null;primaryLabel='';
  } else {
    verdict='DO NOTHING';verdictIcon='📊';verdictColor='#94a3b8';verdictBg='#0f1828';verdictBorder='#1e2d4a';
    verdictReason=_toStop!=null?`Down ${fmt(Math.abs(_aboveEntry),1)}% but ${fmt(_toStop,1)}% above stop. No action needed.`:`Down ${fmt(Math.abs(_aboveEntry),1)}%. No action needed.`;
    primaryAction=null;primaryLabel='';
  }

  // Verdict pill color for header
  const verdictPillColor=verdict.startsWith('SELL')?'#ef4444':verdict.startsWith('WATCH')?'#f59e0b':verdict==='DO NOTHING'?'#60a5fa':'#94a3b8';
  const verdictPillText=verdict.startsWith('SELL NOW')?'SELL':verdict==='WATCH CLOSELY'?'WATCH':verdict==='DO NOTHING'?'HOLD':'—';

  return(
    <div style={{borderTop:'1px solid #1e2d4a',background:'#0a0e1a'}}>
      {/* ═══════════ PRICE ALERT — critical warning ═══════════ */}
      {t.priceAlert&&(
        <div className="px-4 py-2 flex items-start gap-2"
          style={{background:'#7f1d1d',borderBottom:'2px solid #ef4444'}}>
          <span className="text-red-300 animate-pulse flex-shrink-0">🚨</span>
          <div>
            <div className="text-xs font-bold text-red-200">{t.priceAlert.message}</div>
            <div className="text-xs text-red-400 mt-0.5">P&L, stop-loss checks, and take-profit targets are inactive until price data is restored.</div>
          </div>
        </div>
      )}
      {/* ═══════════ HEADER — ticker + P&L ═══════════ */}
      <div className="px-4 pt-3 pb-2">
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="font-black text-lg text-white">{t.ticker}</span>
            <span className="text-xs text-gray-500">{t.strategy}</span>
            <Pill text={verdictPillText} color={verdictPillColor}/>
            {t.score&&<Pill text={`${t.score}/100`} color={t.score>=80?'#22c55e':t.score>=65?'#84cc16':'#f59e0b'}/>}
            {t.signalSources&&t.signalSources.length>0&&(
              <span className="flex gap-0.5 ml-1">
                {t.signalSources.map((src,i)=>{
                  const m=SOURCE_META[src];
                  return m?<span key={i} title={src} style={{fontSize:'11px',cursor:'default'}}>{m.icon}</span>:null;
                })}
              </span>
            )}
          </div>
          <div className="text-right">
            {pnl!=null&&(
              <div className="font-black text-xl"style={{color:pnl>0?'#22c55e':'#ef4444'}}>
                {pnl>0?'+':''}{fmt(pnl,1)}%
              </div>
            )}
            {currentProfit!=null&&(
              <div className="text-xs font-bold"style={{color:currentProfit>0?'#22c55e':'#ef4444'}}>
                {currentProfit>0?'+':''}${fmt(currentProfit,0)}
              </div>
            )}
          </div>
        </div>
      </div>

      {/* ═══════════ SMART ACTION — contextual verdict ═══════════ */}
      <div className="px-4 py-3"style={{background:'#080c16'}}>
        {/* ── VERDICT BANNER ── */}
        <div className="rounded-xl px-4 py-3 mb-2"style={{background:verdictBg,border:`2px solid ${verdictBorder}`}}>
          <div className="flex items-center gap-2 mb-1">
            <span style={{fontSize:'18px'}}>{verdictIcon}</span>
            <span className="font-black text-sm tracking-wide"style={{color:verdictColor}}>{verdict}</span>
          </div>
          <div className="text-xs leading-relaxed"style={{color:verdictColor+'cc'}}>{verdictReason}</div>
        </div>

        {/* ── PRIMARY ACTION BUTTON (if urgent) ── */}
        {primaryAction&&(
          <button onClick={()=>handleClose(primaryAction,primaryLabel)}
            disabled={!!closing}
            className="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-xl text-sm font-black transition-all hover:scale-[1.01] active:scale-95 disabled:opacity-40 mb-2"
            style={{background:verdictColor+'22',border:`2px solid ${verdictColor}`,color:verdictColor}}>
            {closing===primaryAction?<><Spin/><span>Closing…</span></>:<>
              <span>{verdictIcon}</span>
              <span>{primaryLabel}</span>
            </>}
          </button>
        )}

        {/* ── SECONDARY ACTIONS (collapsed by default) ── */}
        <>
            <button onClick={()=>setShowAllActions(v=>!v)}
              className="w-full text-xs py-1 transition"style={{color:'#475569'}}>
              {showAllActions?'▲ Hide other actions':'▼ Other actions'}
            </button>
            {showAllActions&&(
              <div className="grid grid-cols-2 gap-2 mt-2 fade">
                {primaryAction!=='take_profit_1'&&(
                  <button onClick={()=>handleClose('take_profit_1',`Take Profit at TP1 ($${fmt(tp1)})`)}
                    disabled={!!closing}
                    className="flex flex-col items-center gap-0.5 px-2 py-2 rounded-lg text-xs transition-all hover:scale-[1.02] active:scale-95 disabled:opacity-40"
                    style={{background:'#0a1a0d88',border:'1px solid #22c55e33',opacity:0.7}}>
                    {closing==='take_profit_1'?<Spin/>:<>
                      <span style={{color:'#22c55e',fontSize:'11px'}}>TP1 @ ${fmt(tp1)}</span>
                      <span style={{color:'#4ade8088',fontSize:'10px'}}>{tp1Pct!=null&&`+${fmt(tp1Pct,1)}%`}</span>
                    </>}
                  </button>
                )}
                {primaryAction!=='take_profit_2'&&(
                  <button onClick={()=>handleClose('take_profit_2',`Take Profit at TP2 ($${fmt(tp2)})`)}
                    disabled={!!closing}
                    className="flex flex-col items-center gap-0.5 px-2 py-2 rounded-lg text-xs transition-all hover:scale-[1.02] active:scale-95 disabled:opacity-40"
                    style={{background:'#0a1a0d88',border:'1px solid #16a34a33',opacity:0.7}}>
                    {closing==='take_profit_2'?<Spin/>:<>
                      <span style={{color:'#16a34a',fontSize:'11px'}}>TP2 @ ${fmt(tp2)}</span>
                      <span style={{color:'#22c55e88',fontSize:'10px'}}>{tp2Pct!=null&&`+${fmt(tp2Pct,1)}%`}</span>
                    </>}
                  </button>
                )}
                {primaryAction!=='exit_now'&&(
                  <button onClick={()=>handleClose('exit_now','Exit Now at market price')}
                    disabled={!!closing}
                    className="flex flex-col items-center gap-0.5 px-2 py-2 rounded-lg text-xs transition-all hover:scale-[1.02] active:scale-95 disabled:opacity-40"
                    style={{background:'#1a080888',border:'1px solid #ef444433',opacity:0.7}}>
                    {closing==='exit_now'?<Spin/>:<>
                      <span style={{color:'#ef4444',fontSize:'11px'}}>Exit Now{_price?` @ $${fmt(_price)}`:''}</span>
                      <span style={{color:currentProfit!=null&&currentProfit>0?'#4ade8088':'#f8717188',fontSize:'10px'}}>
                        {currentProfit!=null?`${currentProfit>0?'+':''}$${fmt(currentProfit,0)}`:'market'}
                      </span>
                    </>}
                  </button>
                )}
                {primaryAction!=='stopped_out'&&(
                  <button onClick={()=>handleClose('stopped_out',`Stopped Out @ $${fmt(t.stopLoss)}`)}
                    disabled={!!closing}
                    className="flex flex-col items-center gap-0.5 px-2 py-2 rounded-lg text-xs transition-all hover:scale-[1.02] active:scale-95 disabled:opacity-40"
                    style={{background:'#1a0c0888',border:'1px solid #f59e0b33',opacity:0.7}}>
                    {closing==='stopped_out'?<Spin/>:<>
                      <span style={{color:'#f59e0b',fontSize:'11px'}}>Stop @ ${fmt(t.stopLoss)}</span>
                      <span style={{color:'#f8717188',fontSize:'10px'}}>{stopPct!=null&&`${fmt(stopPct,1)}%`}</span>
                    </>}
                  </button>
                )}
              </div>
            )}
          </>
      </div>

      {/* ═══════════ DETAILS — collapsible info section ═══════════ */}
      <div className="px-4 py-2">
        <button onClick={()=>setShowDetails(d=>!d)}
          className="w-full text-xs text-gray-500 hover:text-gray-300 transition flex items-center justify-center gap-1 py-1">
          {showDetails?'▲ Hide Details':'▼ Show Details'} — {shares>0&&`${shares} shares · ${posPct}% ($${fmt(posValue,0)})`} · {t.daysHeld||0}d held
        </button>
        {showDetails&&(
          <div className="pt-2 pb-1 space-y-2 fade">
            {/* price grid */}
            <div className="grid grid-cols-4 gap-2">
              {[
                {l:'Entry',v:`$${fmt(t.entryPrice)}`,bg:'#0f1828',c:'#e2e8f0'},
                {l:'Current',v:t.currentPrice?`$${fmt(t.currentPrice)}`:'—',bg:'#0f1828',c:pnl!=null?(pnl>0?'#4ade80':'#f87171'):'#94a3b8'},
                {l:'Stop',v:`$${fmt(t.stopLoss)}`,bg:'#1a0c0c',c:'#f87171'},
                {l:'Days',v:t.daysHeld!=null?t.daysHeld:'—',bg:'#0f1828',c:t.daysHeld>=8?'#f59e0b':'#94a3b8'},
              ].map((b,i)=>(
                <div key={i} className="rounded-xl p-2 text-center"style={{background:b.bg}}>
                  <div className="text-xs text-gray-600">{b.l}</div>
                  <div className="font-bold text-sm mt-0.5"style={{color:b.c}}>{b.v}</div>
                </div>
              ))}
            </div>
            {/* technical indicators */}
            {t.indicators&&(
              <div className="rounded-xl p-2"style={{background:'#0b1220',border:'1px solid #1e2d4a'}}>
                <div className="text-xs font-bold text-gray-600 mb-1">📊 Technical Indicators</div>
                <div className="grid grid-cols-4 gap-1 text-center">
                  {[
                    t.indicators.rsi2!=null&&{l:'RSI(2)',v:t.indicators.rsi2,c:t.indicators.rsi2<10?'#22c55e':t.indicators.rsi2>90?'#ef4444':'#94a3b8'},
                    t.indicators.rsi14!=null&&{l:'RSI(14)',v:t.indicators.rsi14,c:t.indicators.rsi14<30?'#22c55e':t.indicators.rsi14>70?'#ef4444':'#94a3b8'},
                    t.indicators.zScore!=null&&{l:'Z-Score',v:t.indicators.zScore,c:t.indicators.zScore<-1?'#22c55e':t.indicators.zScore>1?'#ef4444':'#94a3b8'},
                    t.indicators.macd&&{l:'MACD',v:t.indicators.macd.crossover==='none'?(t.indicators.macd.histogram>0?'▲':'▼'):t.indicators.macd.crossover,c:t.indicators.macd.histogram>0?'#22c55e':'#ef4444'},
                    t.indicators.stochastic&&{l:'Stoch %K',v:t.indicators.stochastic.k,c:t.indicators.stochastic.signal==='oversold'?'#22c55e':t.indicators.stochastic.signal==='overbought'?'#ef4444':'#94a3b8'},
                    t.indicators.bollingerPctB!=null&&{l:'BB %B',v:t.indicators.bollingerPctB.toFixed(2),c:t.indicators.bollingerPctB<0.2?'#22c55e':t.indicators.bollingerPctB>0.8?'#ef4444':'#94a3b8'},
                    t.indicators.volumeRatio!=null&&{l:'Vol',v:t.indicators.volumeRatio+'×',c:t.indicators.volumeRatio>=1.5?'#f59e0b':'#94a3b8'},
                    t.indicators.obv&&{l:'OBV',v:t.indicators.obv.divergence!=='none'?t.indicators.obv.divergence:t.indicators.obv.trend,c:t.indicators.obv.divergence==='bullish'?'#22c55e':t.indicators.obv.divergence==='bearish'?'#ef4444':'#94a3b8'},
                  ].filter(Boolean).map((ind,i)=>(
                    <div key={i} className="rounded-lg px-1 py-1"style={{background:'#0f1828'}}>
                      <div style={{fontSize:'9px',color:'#475569'}}>{ind.l}</div>
                      <div className="font-bold"style={{fontSize:'11px',color:ind.c}}>{ind.v}</div>
                    </div>
                  ))}
                </div>
                {t.indicators.fibSupport&&(
                  <div className="flex gap-3 mt-1 text-center">
                    <div className="flex-1 rounded-lg px-1 py-1"style={{background:'#0a1a0d'}}>
                      <div style={{fontSize:'9px',color:'#475569'}}>Fib Support</div>
                      <div className="font-bold"style={{fontSize:'11px',color:'#4ade80'}}>${t.indicators.fibSupport}</div>
                    </div>
                    {t.indicators.fibResistance&&(
                      <div className="flex-1 rounded-lg px-1 py-1"style={{background:'#1a0c0c'}}>
                        <div style={{fontSize:'9px',color:'#475569'}}>Fib Resistance</div>
                        <div className="font-bold"style={{fontSize:'11px',color:'#f87171'}}>${t.indicators.fibResistance}</div>
                      </div>
                    )}
                  </div>
                )}
                {t.indicators.signals?.length>0&&(
                  <div className="mt-1 text-xs leading-relaxed"style={{color:'#6b7280'}}>
                    {t.indicators.signals.slice(0,3).map((s,i)=><div key={i}>• {s}</div>)}
                  </div>
                )}
              </div>
            )}
            {/* source signals — OUTSIDE indicators block so it shows even without TA data */}
            {t.signalAttribution&&t.signalAttribution.length>0&&(
              <div className="rounded-xl p-2"style={{background:'#0b1220',border:'1px solid #1e2d4a'}}>
                <div className="text-xs font-bold text-gray-600 mb-1">🎯 Source Signals</div>
                {/* stacked bar */}
                <div className="rounded-full overflow-hidden h-2 flex mb-2"style={{background:'#1e2d4a'}}>
                  {[...t.signalAttribution].sort((a,b)=>b.weight-a.weight).filter(s=>s.weight>0).map((s,i)=>{
                    const meta=SOURCE_META[s.source]||{color:'#94a3b8'};
                    return <div key={i} style={{width:`${s.weight}%`,background:meta.color}} title={`${s.source}: ${s.weight}%`}/>;
                  })}
                </div>
                {[...t.signalAttribution].sort((a,b)=>b.weight-a.weight).map((s,i)=>{
                  const meta=SOURCE_META[s.source]||{icon:'❓',color:'#94a3b8'};
                  const vc=VERDICT_COLOR[s.verdict]||'#94a3b8';
                  return s.verdict==='NO_DATA'?null:(
                    <div key={i} className="flex items-start gap-1.5 mt-1">
                      <span style={{fontSize:'11px'}}>{meta.icon}</span>
                      <div className="flex-1 min-w-0">
                        <span className="text-xs font-bold"style={{color:meta.color}}>{s.source}</span>
                        <span className="text-xs ml-1"style={{color:meta.color}}>{s.weight}%</span>
                        <span className="text-xs ml-1 px-1 rounded-full"style={{background:vc+'20',color:vc,fontSize:'9px'}}>{s.verdict}</span>
                        <div className="text-xs text-gray-600 leading-snug">{s.signal}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
            {/* reasoning from last analysis */}
            {t.right&&(
              <div className="rounded-xl p-2"style={{background:'#0b1220',border:'1px solid #1e2d4a'}}>
                <div className="text-xs font-bold text-gray-600 mb-1">📝 Analysis Notes</div>
                <div className="text-xs text-gray-400 leading-relaxed">{t.right}</div>
              </div>
            )}
            {/* progress bar */}
            {t.currentPrice&&t.entryPrice&&t.stopLoss&&(
              <div>
                <div className="rounded-lg overflow-hidden h-2 flex"style={{background:'#1e2d4a'}}>
                  {(()=>{
                    const range=tp1-t.stopLoss;
                    const pos=Math.max(0,Math.min(1,(t.currentPrice-t.stopLoss)/range));
                    return <div style={{width:`${pos*100}%`,background:t.currentPrice>=t.entryPrice?'#22c55e':'#ef4444',transition:'width 0.5s'}}/>;
                  })()}
                </div>
                <div className="flex justify-between text-xs mt-1"style={{color:'#475569'}}>
                  <span>Stop ${fmt(t.stopLoss)}</span>
                  <span>Entry ${fmt(t.entryPrice)}</span>
                  <span>TP1 ${fmt(tp1)}</span>
                </div>
              </div>
            )}
            {/* reasoning */}
            {t.right&&<div className="text-xs text-gray-500 leading-relaxed">{t.right}</div>}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── BUY OPPORTUNITY CARD — with Create Draft button ─────────────────────
function BuyOpportunityCard({o,regime,onDraftCreated}){
  const [creating,setCreating]=useState(false);
  const [drafted,setDrafted]=useState(false);

  const createDraft=async()=>{
    if(window.location.protocol==='file:')return;
    setCreating(true);
    try{
      const r=await fetch('/api/create-draft',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          ticker:o.ticker,strategy:o.strategy||'Mean Reversion',
          score:o.score,reasoning:o.reasoning,regime:regime||'',
          positionPct:o.positionPct,entryPrice:o.entryPrice
        }),
      });
      const d=await r.json();
      if(d.ok){setDrafted(true);onDraftCreated&&onDraftCreated();}
      else{alert('Failed to create draft: '+(d.error||'unknown error'));}
    }catch(e){alert('Error: '+e.message);}
    finally{setCreating(false);}
  };

  return(
    <div className="px-4 py-3"style={{background:'#0a0e1a',borderTop:'1px solid #0f1828'}}>
      <div className="flex items-center gap-2 mb-1 flex-wrap">
        <span className="font-black text-white text-lg">{o.ticker}</span>
        <Pill text="BUY" color="#22c55e"/>
        {o.score&&<Pill text={`${o.score}/100`} color={o.score>=80?'#22c55e':o.score>=65?'#84cc16':'#f59e0b'}/>}
        <span className="text-xs text-gray-500">{o.strategy}</span>
      </div>
      <div className="text-xs text-gray-400 leading-relaxed mb-2">{o.reasoning}</div>

      {o.entryPrice&&(

      {drafted?(
        <div className="flex items-center gap-2 py-2 px-3 rounded-xl text-xs font-bold"
          style={{background:'#0f1a0f',color:'#22c55e',border:'1px solid #22c55e44'}}>
          ✅ Draft created — confirm or reject in Order Drafts above
        </div>
      ):(
        <button onClick={createDraft} disabled={creating}
          className="w-full py-3 rounded-2xl text-sm font-bold transition-all hover:opacity-90"
          style={{background:creating?'#14532d':'#22c55e',color:'#000',opacity:creating?0.7:1}}>
          {creating?<><span className="inline-block w-3 h-3 rounded-full border-2 spin mr-2"style={{borderColor:'#000',borderTopColor:'transparent'}}/>Creating Draft…</>:'➕ Create Order Draft'}
        </button>
      )}
      {o.positionPct&&<div className="text-xs text-gray-600 text-center mt-1">Position: {o.positionPct}% of portfolio</div>}
    </div>
  );
}

// ─── ANALYSIS PANEL — Claude embedded directly ───────────────────────────
function TickerAssess(){
  const [ticker,setTicker]=useState('');
  const [thesis,setThesis]=useState('');
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);
  const [error,setError]=useState(null);
  const [expanded,setExpanded]=useState(false);

  const assess=async()=>{
    const t=ticker.trim().toUpperCase();
    if(!t)return;
    setLoading(true);setError(null);setResult(null);
    try{
      const r=await fetch('/api/analyze',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ticker:t,thesis:thesis.trim()||undefined,command:`score ${t}`,mode:'full'}),
      });
      const d=await r.json();
      if(d.error){setError(d.error);return;}
      setResult(d);
    }catch(e){setError(e.message);}
    finally{setLoading(false);}
  };

  const verdictColor={'STRONG BUY':'#22c55e',BUY:'#4ade80',WATCHLIST:'#f59e0b',HOLD:'#94a3b8',AVOID:'#ef4444'};
  const scoreColor=s=>s>=75?'#22c55e':s>=60?'#4ade80':s>=45?'#f59e0b':s>=30?'#fb923c':'#ef4444';

  return(
    <Card>
      <div className="px-4 py-3 flex items-center justify-between"
        style={{borderBottom:'1px solid #0f1828',cursor:'pointer'}} onClick={()=>setExpanded(!expanded)}>
        <div className="flex items-center gap-2">
          <span className="text-lg">🔍</span>
          <span className="text-sm font-bold">Score a Ticker</span>
          <span className="text-xs text-gray-500 ml-2">Deep single-stock assessment</span>
        </div>
        <span className="text-gray-500 text-xs">{expanded?'▼':'▶'}</span>
      </div>
      {expanded&&(
        <div className="p-4 space-y-3">
          <div className="flex gap-2">
            <input value={ticker} onChange={e=>setTicker(e.target.value.toUpperCase())}
              placeholder="TICKER" maxLength={5}
              className="w-24 px-3 py-2 text-sm font-bold uppercase tracking-wider text-center"
              style={{background:'#0d1120',border:'1px solid #1e2d4a',borderRadius:10}}
              onKeyDown={e=>e.key==='Enter'&&assess()}/>
            <button onClick={assess} disabled={loading||!ticker.trim()}
              className="px-4 py-2 rounded-xl text-sm font-bold transition-all hover:scale-105"
              style={{background:loading?'#1e2d4a':'#3b82f6',color:'#fff',opacity:(!ticker.trim()||loading)?0.5:1}}>
              {loading?'Analyzing…':'Score'}
            </button>
          </div>
          <textarea value={thesis} onChange={e=>setThesis(e.target.value)}
            placeholder="Optional: paste your investment thesis, research notes, or why you're interested in this stock…"
            rows={3} className="w-full px-3 py-2 text-xs resize-none"
            style={{background:'#0d1120',border:'1px solid #1e2d4a',borderRadius:10,lineHeight:1.5}}/>

          {error&&<div className="text-red-400 text-xs p-2 rounded-lg"style={{background:'#7f1d1d33'}}>Error: {error}</div>}

          {result&&(()=>{
            // Assessment result can be the full analysis JSON or a direct ticker object
            const a=result.ticker?result:(result.opportunities?.[0]||result);
            if(!a.score&&!a.verdict)return <div className="text-gray-500 text-xs">No assessment data returned.</div>;
            return(
              <div className="space-y-3 fade">
                {/* Header: score + verdict */}
                <div className="flex items-center gap-3">
                  <div className="text-4xl font-black"style={{color:scoreColor(a.score)}}>{a.score}</div>
                  <div>
                    <div className="text-sm font-bold"style={{color:verdictColor[a.verdict]||'#94a3b8'}}>{a.verdict||a.action}</div>
                    <div className="text-xs text-gray-400">{a.headline||a.reasoning?.slice(0,80)}</div>
                  </div>
                </div>

                {/* Thesis evaluation */}
                {a.thesisEvaluation&&(
                  <div className="text-xs p-3 rounded-lg"style={{background:'#0d1120',border:'1px solid #1e2d4a'}}>
                    <div className="text-gray-500 font-bold mb-1">Thesis Evaluation</div>
                    <div className="text-gray-300">{a.thesisEvaluation}</div>
                  </div>
                )}

                {/* Score breakdown */}
                {a.technicalSetup&&(
                  <div className="grid grid-cols-4 gap-2 text-center text-xs">
                    {[
                      {l:'Technical',v:a.technicalSetup?.score,max:40},
                      {l:'Fundamental',v:a.fundamentalSetup?.score,max:30},
                      {l:'Macro',v:a.macroAlignment?.score,max:20},
                      {l:'Timing',v:a.timingScore?.score,max:10},
                    ].map((d,i)=>(
                      <div key={i} className="p-2 rounded-lg"style={{background:'#0d1120'}}>
                        <div className="text-gray-500 mb-1">{d.l}</div>
                        <div className="font-bold"style={{color:scoreColor(d.v/d.max*100)}}>{d.v}/{d.max}</div>
                      </div>
                    ))}
                  </div>
                )}

                {/* Entry levels */}
                {(a.entryZone||a.stop||a.targets)&&(
                  <div className="text-xs p-3 rounded-lg grid grid-cols-3 gap-2"style={{background:'#0d1120'}}>
                    {a.entryZone&&<div><span className="text-gray-500">Entry:</span> <span className="text-green-400 font-bold">${fmt(a.entryZone.mid||a.entryZone.low)}</span></div>}
                    {a.stop&&<div><span className="text-gray-500">Stop:</span> <span className="text-red-400 font-bold">${fmt(a.stop)}</span></div>}
                    {a.targets&&<div><span className="text-gray-500">TP1:</span> <span className="text-blue-400 font-bold">${fmt(a.targets.tp1)}</span></div>}
                  </div>
                )}

                {/* Position sizing (wallet-aware) */}
                {a.positionSizing&&(
                  <div className="text-xs text-gray-400 flex gap-4">
                    <span>💰 ${fmt(a.positionSizing.positionDollars,0)} ({fmt(a.positionSizing.positionPct,1)}%)</span>
                    <span>{fmt(a.positionSizing.shares,2)} shares</span>
                    <span>Risk: ${fmt(a.positionSizing.riskDollars,0)}</span>
                  </div>
                )}

                {/* Signal attribution */}
                {a.signalAttribution&&a.signalAttribution.length>0&&(
                  <div className="text-xs space-y-1">
                    <div className="text-gray-500 font-bold">Signal Sources</div>
                    {a.signalAttribution.filter(s=>s.weight>0).sort((a,b)=>b.weight-a.weight).map((s,i)=>(
                      <div key={i} className="flex items-center gap-2">
                        <div className="w-16 text-right text-gray-500">{s.weight}%</div>
                        <div className="flex-1 h-1.5 rounded-full overflow-hidden"style={{background:'#1e2d4a'}}>
                          <div className="h-full rounded-full"style={{
                            width:`${s.weight}%`,
                            background:s.verdict==='BULLISH'?'#22c55e':s.verdict==='BEARISH'?'#ef4444':'#94a3b8'
                          }}/>
                        </div>
                        <div className="w-32 truncate"style={{color:s.verdict==='BULLISH'?'#4ade80':s.verdict==='BEARISH'?'#f87171':'#94a3b8'}}>{s.source}</div>
                      </div>
                    ))}
                  </div>
                )}

                {/* Strategy + time horizon */}
                <div className="flex gap-3 text-xs text-gray-500">
                  {a.strategy&&<span className="px-2 py-0.5 rounded-full"style={{background:'#1e2d4a'}}>{a.strategy}</span>}
                  {a.timeHorizon&&<span className="px-2 py-0.5 rounded-full"style={{background:'#1e2d4a'}}>{a.timeHorizon}</span>}
                </div>
              </div>
            );
          })()}
        </div>
      )}
    </Card>
  );
}

function AnalysisPanel(){
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);
  const [error,setError]=useState(null);
  const [command,setCommand]=useState('full_analysis');

  const run=async(cmd,mode='full')=>{
    if(window.location.protocol==='file:'){
      setError('Live analysis requires the hosted app. Open investment-terminal-tawny.vercel.app');
      return;
    }
    setLoading(true);setResult(null);setError(null);setCommand(cmd);
    try{
      const r=await fetch('/api/analyze',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({command:cmd,mode}),
      });
      const d=await r.json();
      if(d.error)throw new Error(d.error);
      setResult(d);
    }catch(e){setError(e.message);}
    finally{setLoading(false);}
  };

  const cmds=[
    {id:'run investment analysis',label:'🤖 Full Analysis',color:'#6366f1',desc:'Deep scan + attribution (Sonnet)',mode:'full'},
    {id:'portfolio review',label:'📈 Portfolio Review',color:'#22c55e',desc:'Position status (Sonnet)',mode:'full'},
    {id:'discover hidden gems',label:'🔍 Discover',color:'#a855f7',desc:'Find underrated stocks (Sonnet + Finviz)',mode:'discover'},
    {id:'live market pulse',label:'⚡ Quick Check',color:'#f59e0b',desc:'Regime + positions (Haiku)',mode:'quick'},
  ];

  const regimeColor=n=>!n?'#94a3b8':n.includes('CAUTION')||n.includes('FEAR')?'#ef4444':n.includes('BREAKOUT')?'#22c55e':'#6366f1';

  return(
    <Card className="overflow-hidden">
      {/* header with run buttons */}
      <div className="px-4 py-3"style={{background:'#0f1828',borderBottom:'1px solid #1e2d4a'}}>
        <div className="text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">
          AI Analysis — powered by Claude
        </div>
        <div className="flex gap-2 flex-wrap">
          {cmds.map(c=>(
            <button key={c.id} onClick={()=>run(c.id,c.mode||'full')} disabled={loading}
              className="flex items-center gap-1.5 px-3 py-2 rounded-xl text-xs font-bold transition-all"
              style={{
                background:loading&&command===c.id?c.color+'40':c.color+'18',
                color:c.color, border:`1px solid ${c.color}44`,
                opacity:loading&&command!==c.id?0.5:1
              }}>
              {loading&&command===c.id?<><Spin/> Analyzing…</>:<>{c.label}</>}
            </button>
          ))}
        </div>
      </div>

      {/* loading */}
      {loading&&(
        <div className="px-4 py-6 flex items-center gap-3"style={{background:'#08101e'}}>
          <Spin/>
          <div>
            <div className="text-sm text-gray-300 font-semibold">Claude is analyzing the market…</div>
            <div className="text-xs text-gray-500 mt-0.5">Fetching VIX, SPY, checking positions, scoring candidates</div>
          </div>
        </div>
      )}

      {/* error */}
      {error&&(
        <div className="px-4 py-3 text-xs text-red-400"style={{background:'#1a0808'}}>
          ⚠️ {error}
        </div>
      )}

      {/* results */}
      {result&&!loading&&(
        <div className="fade">
          {/* model badge */}
          {result._model&&(
            <div className="px-4 pt-2 pb-0 flex items-center gap-2"style={{background:'#08101e'}}>
              <span className="text-xs px-2 py-0.5 rounded-full font-bold"
                style={{background:result._mode==='quick'?'#f59e0b20':'#6366f120',
                  color:result._mode==='quick'?'#f59e0b':'#6366f1',
                  border:`1px solid ${result._mode==='quick'?'#f59e0b':'#6366f1'}33`}}>
                {result._mode==='quick'?'⚡ Quick':'🔬 Deep'} — {result._model.includes('haiku')?'Haiku':'Sonnet'}
              </span>
            </div>
          )}
          {/* source status alerts */}
          {result._sourceStatus&&(()=>{
            const ss=result._sourceStatus;
            const failures=[];
            if(ss.technicalAnalysis==='failed')failures.push({name:'Technical Analysis',icon:'📊',detail:'No OHLCV data from Finnhub'});
            if(ss.worldMonitor==='failed')failures.push({name:'World Monitor',icon:'🌍',detail:'Macro signals + F&G unavailable'});
            if(ss.finvizScreener==='failed'||ss.finvizScreener==='empty')failures.push({name:'Finviz Screener',icon:'🔍',detail:'Screener returned no tickers'});
            if(ss.capitolTrades==='failed')failures.push({name:'Capitol Trades',icon:'🏛️',detail:'Congressional trading data unavailable'});
            if(ss.fearGreed==='failed')failures.push({name:'Fear & Greed',icon:'😱',detail:'Composite index unavailable'});
            if(ss.finnhubPrice==='failed')failures.push({name:'Finnhub Prices',icon:'💲',detail:'SPY price unavailable'});
            if(!failures.length)return null;
            return(
              <div className="px-4 py-2"style={{background:'#7f1d1d22',borderBottom:'1px solid #ef444433'}}>
                <div className="text-xs font-bold text-red-400 mb-1">
                  ⚠️ {failures.length} signal source{failures.length>1?'s':''} unavailable — analysis may be incomplete

                <div className="flex gap-2 flex-wrap">
                  {failures.map((f,i)=>(
                    <span key={i} className="inline-flex items-center gap-1 px-2 py-0.5 rounded-lg text-xs"
                      style={{background:'#ef444418',border:'1px solid #ef444433',color:'#fca5a5'}}>
                      <span style={{fontSize:'10px'}}>{f.icon}</span>
                      <span className="font-semibold">{f.name}</span>
                      <span className="text-red-500">— {f.detail}</span>
                    </span>
                  ))}
                </div>
              </div>
            );
          })()}

          {/* regime */}
          {result.regime&&(
            <div className="px-4 py-4"
              style={{background:`linear-gradient(135deg,${regimeColor(result.regime.name)}0a,#08101e)`,borderBottom:'1px solid #1e2d4a'}}>

              <div className="text-xs font-semibold rounded-xl px-3 py-2 inline-block"

                → {result.regime.action}
              </div>
            </div>
          )}

          {/* positions — analysis recommendations with scroll-to-action */}
          {result.positions?.length>0&&(
            <div style={{borderBottom:'1px solid #1e2d4a'}}>
              <div className="px-4 py-2 text-xs font-bold uppercase tracking-wider text-gray-500"

                          <Pill text="WATCH" color="#f59e0b"/>
                          {o.score&&<Pill text={`${o.score}/100`} color="#f59e0b"/>}
                          <span className="text-xs text-gray-500">{o.strategy}</span>
                        </div>
                        <div className="text-xs text-gray-400 leading-relaxed">{o.reasoning}</div>
                        <SignalAttribution attribution={o.signalAttribution} compact={true}/>
                        {o.waitingFor&&<div className="text-xs text-amber-400 mt-1">Waiting for: {o.waitingFor}</div>}
                      </div>
                    ))}
                  </>
                )}
              </div>
            );
          })()}

          {/* price alerts */}
          {result.priceAlerts?.length>0&&(
            <div style={{background:'#7f1d1d',borderBottom:'2px solid #ef4444'}}>
              {result.priceAlerts.map((a,i)=>(
                <div key={i} className="px-4 py-2 flex items-start gap-2">
                  <span className="text-red-300 animate-pulse flex-shrink-0">🚨</span>
                  <div className="text-xs text-red-200"><span className="font-bold">{a.ticker}:</span> {a.alert}</div>
                </div>
              ))}
            </div>
          )}

          {/* drafts created (by API auto-create) */}
          {result.draftsCreated?.length>0&&(
            <div className="px-4 py-3 text-xs"style={{background:'#0f1a0f',borderBottom:'1px solid #1e2d4a'}}>
              <span className="text-green-400 font-bold">✅ {result.draftsCreated.length} Order Draft{result.draftsCreated.length>1?'s':''} auto-created</span>
              <span className="text-gray-500 ml-2">— scroll up to confirm or reject</span>
            </div>
          )}

          {/* footer */}
          <div className="px-4 py-3 flex items-center justify-between"style={{background:'#0f1828'}}>
            <div className="text-xs text-gray-600">{result.stance} stance · {result.recommendedCash} cash</div>
            <div className="text-xs text-gray-600">{result.nextCheckIn}</div>
          </div>
        </div>
      )}

      {/* empty state */}
      {!loading&&!result&&!error&&(
        <div className="px-4 py-5 text-center text-xs text-gray-600">
          Click a button above to run analysis — results appear here
        </div>
      )}
    </Card>
  );
}

// ─── QUICK COMMANDS (fallback copy buttons) ──────────────────────────────
function QuickCommands(){
  const [copied,setCopied]=useState(null);

  const copy=(id,text)=>{
    navigator.clipboard.writeText(text).then(()=>{
      setCopied(id);
      setTimeout(()=>setCopied(null),2000);
    }).catch(()=>{
      // Fallback for non-secure contexts
      const el=document.createElement('textarea');
      el.value=text;document.body.appendChild(el);el.select();
      document.execCommand('copy');document.body.removeChild(el);
      setCopied(id);setTimeout(()=>setCopied(null),2000);
    });
  };

  const cmds=[
    {id:'analysis', icon:'🤖', label:'Full Analysis',     cmd:'run investment analysis',        color:'#6366f1', desc:'Signals + recommendations'},
    {id:'pulse',    icon:'🌡️', label:'Market Pulse',      cmd:'live market pulse',               color:'#3b82f6', desc:'Quick VIX/F&G/regime'},
    {id:'portfolio', icon:'📈', label:'Portfolio Review',   cmd:'portfolio review',                color:'#22c55e', desc:'All positions: hold/exit/profit?'},
    {id:'score',    icon:'🎯', label:'Score a Ticker',    cmd:'score ',                          color:'#f59e0b', desc:'Type ticker after pasting'},
    {id:'weekly',   icon:'📋', label:'Weekly Review',     cmd:'weekly review',                   color:'#a78bfa', desc:'7-question audit'},
    {id:'agents',   icon:'▶️', label:'Start Agents',      cmd:'start agents',                    color:'#94a3b8', desc:'Enable all 4 scans'},
    {id:'validate', icon:'📊', label:'Validation Report', cmd:'validation report',                color:'#a78bfa', desc:'How is the system performing?'},
  ];

  return(
    <Card className="p-4">
      <div className="text-xs font-bold uppercase tracking-wider text-gray-500 mb-3">
        Quick Commands — click to copy, paste in Claude
      </div>
      <div className="grid grid-cols-2 gap-2">
        {cmds.map(c=>{
          const isCopied=copied===c.id;
          return(
            <button key={c.id}
              onClick={()=>copy(c.id,c.cmd)}
              className="flex items-center gap-2 rounded-xl px-3 py-2.5 text-left transition-all"
              style={{
                background: isCopied?c.color+'30':'#0a0e1a',
                border:`1px solid ${isCopied?c.color:' #1e2d4a'}`,
              }}>
              <span className="text-lg flex-shrink-0">{c.icon}</span>
              <div className="min-w-0">
                <div className="text-xs font-bold"style={{color:isCopied?c.color:'#e2e8f0'}}>
                  {isCopied?'✓ Copied!':c.label}
                </div>
                <div className="text-xs text-gray-600 truncate">{c.desc}</div>
              </div>
            </button>
          );
        })}
      </div>
      <div className="text-xs text-gray-700 text-center mt-3">
        Paste the copied command into your Claude chat → hit Enter
      </div>
    </Card>
  );
}

// ─── DAILY BRIEF (main view) ──────────────────────────────────────────────
function DailyBrief(){
  const [live,setLive]=useState(null);
  const [status,setStatus]=useState('idle'); // idle | loading | done | failed
  const [ts,setTs]=useState(null);
  const [bannerErrors,setBannerErrors]=useState(()=>load('inv_errors',[]));
  const [manualVix,setManualVix]=useState('');
  const [manualFg,setManualFg]=useState('');
  const [spyTrend,setSpyTrend]=useState('above');

  // Notion-backed positions + stats
  const [positions,setPositions]=useState([]);
  const [closedTrades,setClosedTrades]=useState([]);
  const [stats,setStats]=useState(null);
  const [wallet,setWallet]=useState(null);
  const [sourceWeights,setSourceWeights]=useState(null);
  const [portfolioMetrics,setPortfolioMetrics]=useState(null);
  const [diagnostics,setDiagnostics]=useState(null);
  const [posStatus,setPosStatus]=useState('idle'); // idle | loading | done | failed
  const [aiCheckStatus,setAiCheckStatus]=useState('idle'); // idle | loading | done | failed

  // Evaluation flow state
  const [evalStatus,setEvalStatus]=useState('idle');
  const [evalResults,setEvalResults]=useState(null);
  const [approvals,setApprovals]=useState({});
  const [applyStatus,setApplyStatus]=useState('idle');
  const [autoFix,setAutoFix]=useState(false);
  const [evalPageId,setEvalPageId]=useState(null);
  const [evalHistory,setEvalHistory]=useState([]);
  const histChartRef=useRef(null);
  const histCanvasRef=useRef(null);
  const [consistencyN,setConsistencyN]=useState(3);
  const [consistencyStatus,setConsistencyStatus]=useState('idle'); // idle|running|done
  const [consistencyReport,setConsistencyReport]=useState(null);
  const [consistencyProgress,setConsistencyProgress]=useState(0);

  // Load latest eval report from Notion staging DB on mount
  useEffect(()=>{
    if(window.location.protocol==='file:')return;
    (async()=>{
      try{
        const r=await fetch('/api/get-positions',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({action:'eval_load'})
        });
        const d=await r.json();
        if(d.found&&d.report){
          setEvalResults(d.report);
          setApprovals(d.approvals||{});
          setEvalPageId(d.evalId);
          setEvalStatus('done');
        }
      }catch(e){/* no saved eval, stay idle */}
      // Also fetch eval history for trend graph
      try{
        const hr=await fetch('/api/get-positions',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({action:'eval_history'})
        });
        const hd=await hr.json();
        if(hd.history)setEvalHistory(hd.history);
      }catch(e){}
    })();
  },[]);

  // Render eval history chart when data changes
  useEffect(()=>{
    if(!histCanvasRef.current||evalHistory.length<1)return;
    if(histChartRef.current)histChartRef.current.destroy();
    const labels=evalHistory.map(h=>h.date);
    histChartRef.current=new Chart(histCanvasRef.current,{
      type:'line',
      data:{
        labels,
        datasets:[
          {
            label:'Grade',
            data:evalHistory.map(h=>h.gradeNum),
            borderColor:'#a855f7',
            backgroundColor:'#a855f722',
            yAxisID:'y',
            tension:0.3,
            pointRadius:5,
            pointBackgroundColor:evalHistory.map(h=>
              h.grade==='A'?'#22c55e':h.grade==='B'?'#3b82f6':h.grade==='C'?'#f59e0b':h.grade==='D'?'#f97316':'#ef4444'),
            pointBorderColor:'transparent',
            fill:true,
          },
          {
            label:'Risk Score',
            data:evalHistory.map(h=>h.riskScore),
            borderColor:'#ef4444',
            backgroundColor:'transparent',
            yAxisID:'y2',
            tension:0.3,
            pointRadius:3,
            borderDash:[4,4],
          },
          {
            label:'Tunings Applied',
            data:evalHistory.map(h=>h.appliedCount),
            borderColor:'#22c55e',
            backgroundColor:'transparent',
            yAxisID:'y2',
            tension:0.3,
            pointRadius:3,
            borderDash:[2,2],
          }
        ]
      },
      options:{
        responsive:true,
        maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{
          legend:{display:true,labels:{color:'#64748b',font:{size:10},boxWidth:12,padding:8}},
          tooltip:{
            backgroundColor:'#0d1120ee',borderColor:'#1e2d4a',borderWidth:1,
            callbacks:{
              label:function(ctx){
                if(ctx.dataset.label==='Grade'){
                  const g=evalHistory[ctx.dataIndex]?.grade||'?';
                  return `Grade: ${g}`;
                }
                return `${ctx.dataset.label}: ${ctx.parsed.y}`;
              }
            }
          }
        },
        scales:{
          x:{ticks:{color:'#4b5563',font:{size:9}},grid:{color:'#1e2d4a33'}},
          y:{
            position:'left',min:0,max:5.5,
            ticks:{
              color:'#a855f7',font:{size:9},stepSize:1,
              callback:function(v){return{1:'F',2:'D',3:'C',4:'B',5:'A'}[v]||'';}
            },
            grid:{color:'#1e2d4a33'}
          },
          y2:{
            position:'right',min:0,max:10,
            ticks:{color:'#ef444488',font:{size:9}},
            grid:{display:false}
          }
        }
      }
    });
    return()=>{if(histChartRef.current){histChartRef.current.destroy();histChartRef.current=null;}};
  },[evalHistory]);

  const fetchPositions=useCallback(async()=>{
    if(window.location.protocol==='file:')return;
    setPosStatus('loading');
    try{
      const r=await fetch('/api/get-positions');
      const d=await r.json();
      if(d.positions)setPositions(d.positions);
      if(d.closedTrades)setClosedTrades(d.closedTrades);
      if(d.stats)setStats(d.stats);
      if(d.wallet)setWallet(d.wallet);
      if(d.sourceWeights)setSourceWeights(d.sourceWeights);
      if(d.portfolioMetrics)setPortfolioMetrics(d.portfolioMetrics);
      if(d.diagnostics)setDiagnostics(d.diagnostics);
      setPosStatus('done');
    }catch(e){
      logError('FETCH_POSITIONS',e.message,{});
      setPosStatus('failed');
    }
  },[]);

  const refresh=useCallback(async()=>{
    setStatus('loading');setLive(null);
    const d=await fetchAllMarketData();
    const freshErrors=load('inv_errors',[]);
    setBannerErrors(freshErrors);
    if(!d.vix&&!d.spy&&!d.fg){setStatus('failed');}
    else{setLive({vix:d.vix,spy:d.spy,fg:d.fg});setStatus('done');setTs(new Date());}
  },[]);

  // ── Auto quick check: after positions load, run Claude analysis in background ──
  const runAutoQuickCheck=useCallback(async()=>{
    if(window.location.protocol==='file:')return;
    setAiCheckStatus('loading');
    try{
      const r=await fetch('/api/analyze',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({command:'live market pulse',mode:'quick'}),
      });
      const d=await r.json();
      if(d.error){setAiCheckStatus('failed');return;}
      // Merge Claude's recommendations into positions
      if(d.positions&&d.positions.length>0){
        setPositions(prev=>prev.map(p=>{
          const ai=d.positions.find(ap=>ap.ticker===p.ticker);
          if(!ai)return p;
          return{...p,
            recommendation:ai.recommendation||p.recommendation,
            right:ai.reasoning||p.right,
            urgency:ai.urgency||p.urgency,
            _aiChecked:true,
          };
        }));
      }
      setAiCheckStatus('done');
    }catch(e){setAiCheckStatus('failed');}
  },[]);

  useEffect(()=>{refresh();fetchPositions();},[]);
  // Auto-run quick check once positions are loaded
  useEffect(()=>{
    if(posStatus==='done'&&positions.length>0&&aiCheckStatus==='idle'){
      runAutoQuickCheck();
    }
  },[posStatus,positions.length,aiCheckStatus,runAutoQuickCheck]);
  // Listen for draft confirmations to refresh positions
  useEffect(()=>{
    const h=()=>{setTimeout(fetchPositions,2000);};
    window.addEventListener('refreshDrafts',h);
    return()=>window.removeEventListener('refreshDrafts',h);
  },[fetchPositions]);

  // ── Evaluate: run diagnose mode, auto-apply qualified fixes ──
  const runEvaluation=useCallback(async()=>{
    if(window.location.protocol==='file:')return;
    setEvalStatus('loading');setEvalResults(null);setApprovals({});setApplyStatus('idle');
    try{
      const r=await fetch('/api/analyze',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({mode:'diagnose',command:'evaluate performance'})
      });
      const d=await r.json();
      if(d.parseError){setEvalStatus('error');return;}

      // Quality gate: filter recs with qualityScore >= 6 and not deferred
      const today=new Date().toISOString().split('T')[0];
      const qualified=(d.recommendations||[]).filter(rec=>{
        if(rec.qualityScore!=null&&rec.qualityScore<6)return false;
        if(rec.applyAfter&&rec.applyAfter>today)return false;
        return true;
      });
      const deferred=(d.recommendations||[]).filter(rec=>rec.applyAfter&&rec.applyAfter>today);
      const filtered=(d.recommendations||[]).filter(rec=>rec.qualityScore!=null&&rec.qualityScore<6);

      // Auto-apply all qualified recs to Tuning Log
      const applied=[];
      for(const rec of qualified){
        try{
          const ar=await fetch('/api/get-positions',{
            method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({action:'tuning_log',rec:{
              title:rec.title,category:rec.category,severity:rec.severity,
              recommendation:rec.recommendation,paramBefore:rec.paramBefore,
              paramAfter:rec.paramAfter,expectedImpact:rec.expectedImpact,
              confidence:rec.confidence,evidence:rec.evidence,
              finding:rec.finding,diagnosis:rec.diagnosis,
              tradesAnalyzed:d.tradesAnalyzed||0,
            }})
          });
          const ad=await ar.json();
          applied.push({...rec,tuningId:ad.tuningId,ok:ad.ok});
        }catch(e){applied.push({...rec,ok:false,error:e.message});}
      }

      // Enrich results with auto-apply metadata
      d._applied=applied;
      d._deferred=deferred;
      d._filtered=filtered;
      d._appliedCount=applied.filter(r=>r.ok).length;
      setEvalResults(d);
      setApplyStatus(applied.length>0?'done':'idle');
      setEvalStatus('done');

      // Persist to Notion staging DB
      try{
        const saveR=await fetch('/api/get-positions',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({action:'eval_save',report:d,approvals:{},newRun:true})
        });
        const saveD=await saveR.json();
        if(saveD.evalId)setEvalPageId(saveD.evalId);
      }catch(e){}

      // Refresh positions + history to pick up new tunings
      if(applied.length>0)setTimeout(fetchPositions,1500);
      // Refresh eval history for trend graph
      try{
        const hr=await fetch('/api/get-positions',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({action:'eval_history'})
        });
        const hd=await hr.json();
        if(hd.history)setEvalHistory(hd.history);
      }catch(e){}
    }catch(e){
      logError('EVAL_ERROR',e.message,{});
      setEvalStatus('error');
    }
  },[fetchPositions]);

  // ── Consistency Test: run evaluation N times and compare ──
  const runConsistencyTest=useCallback(async()=>{
    if(window.location.protocol==='file:')return;
    setConsistencyStatus('running');setConsistencyReport(null);setConsistencyProgress(0);
    try{
      // We simulate progress by estimating ~30s per run
      const progInterval=setInterval(()=>{
        setConsistencyProgress(p=>Math.min(p+1,consistencyN*100-1));
      },300);
      const r=await fetch('/api/analyze',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({mode:'consistency',command:'evaluate performance',n:consistencyN})
      });
      clearInterval(progInterval);
      const d=await r.json();
      if(d._consistency){
        setConsistencyReport(d._consistency);
        setConsistencyStatus('done');
      }else{
        setConsistencyReport({error:'No consistency data returned'});
        setConsistencyStatus('done');
      }
      setConsistencyProgress(consistencyN*100);
    }catch(e){
      logError('CONSISTENCY_ERROR',e.message,{});
      setConsistencyStatus('idle');
    }
  },[consistencyN]);

  // ── Apply Fixes: write approved recommendations to Notion Tuning Log ──
  const TUNING_DB='c326714ad2b748878e94c473760c97e3';
  const applyFixes=useCallback(async()=>{
    if(!evalResults?.recommendations)return;
    const approved=evalResults.recommendations.filter(r=>approvals[r.id]);
    if(!approved.length)return;
    setApplyStatus('applying');
    try{
      // Write each approved recommendation to Notion Tuning Log
      const results=[];
      for(const rec of approved){
        const r=await fetch('/api/get-positions',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({action:'tuning_log',rec:{
            title:rec.title,
            category:rec.category,
            severity:rec.severity,
            recommendation:rec.recommendation,
            paramBefore:rec.paramBefore,
            paramAfter:rec.paramAfter,
            expectedImpact:rec.expectedImpact,
            confidence:rec.confidence,
            evidence:rec.evidence,
            finding:rec.finding,
            diagnosis:rec.diagnosis,
            tradesAnalyzed:evalResults.tradesAnalyzed||0,
          }})
        });
        const d=await r.json();
        results.push({id:rec.id,ok:d.ok||false});
      }
      setApplyStatus('done');
      // Refresh positions to get updated data
      setTimeout(fetchPositions,1000);
    }catch(e){
      logError('APPLY_FIXES_ERROR',e.message,{});
      setApplyStatus('error');
    }
  },[evalResults,approvals,fetchPositions]);

  // regime: prefer live data, fall back to manual entry
  const vixVal=live?.vix?.value||Number(manualVix)||null;
  const fgVal=live?.fg?.value||Number(manualFg)||null;
  const spyAbove=live?.spy?(live.spy.above):(spyTrend==='above');
  const regime=vixVal&&fgVal?getRegime(vixVal,fgVal,spyAbove):null;

  const mktStatus=()=>{
    const et=new Date(new Date().toLocaleString('en-US',{timeZone:'America/New_York'}));
    const m=et.getHours()*60+et.getMinutes(),d=et.getDay();
    if(d===0||d===6)return{l:'Weekend',c:'#475569'};
    if(m<9*60+30)return{l:'Pre-Market',c:'#f59e0b'};
    if(m<16*60)return{l:'Open',c:'#22c55e'};
    if(m<20*60)return{l:'After Hours',c:'#94a3b8'};
    return{l:'Closed',c:'#475569'};
  };
  const ms=mktStatus();

  return(
    <div className="min-h-screen"style={{background:'#07090f'}}>

      {/* error banner — always on top */}
      <ErrorBanner
        errors={bannerErrors}
        onDismiss={()=>setBannerErrors([])}
      />

      {/* header */}
      <div className="sticky top-0 z-20 px-4 pt-4 pb-3"
        style={{background:'#07090f',borderBottom:'1px solid #0d1120'}}>
        <div className="max-w-2xl mx-auto flex items-center justify-between">
          <div>
            <span className="font-black text-white tracking-tight">📈 Investment Terminal</span>
            <span className="text-xs text-gray-700 ml-2">Daniel</span>
          </div>
          <div className="flex items-center gap-2">
            <TradingModeSelector/>
            <span className="text-xs font-semibold"style={{color:ms.c}}>● {ms.l}</span>
            <button onClick={refresh} disabled={status==='loading'}
              className="flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-xl"
              style={{background:'#0f1828',color:'#60a5fa',border:'1px solid #1e2d4a'}}>
              {status==='loading'?<><Spin/>Fetching…</>:'↻ Refresh'}
            </button>
          </div>
        </div>
        {/* 2 tabs only */}
        <div className="max-w-2xl mx-auto flex gap-2 mt-3">
          {window._tab==='journal'?
            <button onClick={()=>{window._tab='brief';window.location.reload()}}
              className="text-xs px-3 py-1.5 rounded-xl"
              style={{background:'#0f1828',color:'#6b7280',border:'1px solid #1e2d4a'}}>← Daily Brief</button>
            :null}
        </div>
      </div>

      <div className="px-4 py-4 max-w-2xl mx-auto space-y-4 pb-20">

        {/* ── regime banner ── */}
        {status==='loading'&&!regime&&(
          <Card className="p-5 flex items-center gap-3">
            <Spin/><span className="text-sm text-gray-400">Fetching live market data…</span>
          </Card>
        )}

        {status==='failed'&&!regime&&(
          <Card className="p-4"style={{border:'1px solid #f59e0b22'}}>
            <div className="text-xs font-bold text-amber-400 mb-2">⚡ Live data unavailable — enter manually</div>
            <p className="text-xs text-gray-500 mb-3">The app needs to be hosted online for auto-fetch. Enter today's readings to get your analysis.</p>
            <div className="grid grid-cols-3 gap-2">
              <div>
                <label className="text-xs text-gray-500 block mb-1">VIX</label>
                <input type="number" placeholder="e.g. 18.4" value={manualVix}
                  onChange={e=>setManualVix(e.target.value)} className="w-full px-2 py-1.5 text-sm"/>
              </div>
              <div>
                <label className="text-xs text-gray-500 block mb-1">Fear & Greed</label>
                <input type="number" placeholder="e.g. 49" value={manualFg}
                  onChange={e=>setManualFg(e.target.value)} className="w-full px-2 py-1.5 text-sm"/>
              </div>
              <div>
                <label className="text-xs text-gray-500 block mb-1">SPY vs 50 EMA</label>
                <select value={spyTrend} onChange={e=>setSpyTrend(e.target.value)}
                  className="w-full px-2 py-1.5 text-sm">
                  <option value="above">Above</option>
                  <option value="below">Below</option>
                </select>
              </div>
            </div>
            <div className="mt-2 text-xs text-gray-600">
              Check: <a href="https://finance.yahoo.com/quote/%5EVIX" target="_blank" className="text-blue-500">VIX ↗</a>
              {' · '}<a href="https://cnn.com/markets/fear-and-greed" target="_blank" className="text-blue-500">Fear & Greed ↗</a>
            </div>
          </Card>
        )}

        {regime&&(
          <Card className="p-5 fade"style={{border:`2px solid ${regime.color}44`,background:`linear-gradient(135deg,${regime.color}0a,#0d1120)`}}>
            <div className="flex items-start justify-between gap-3 mb-3">
