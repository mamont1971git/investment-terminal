                  </div>
                  <div className="space-y-1.5">
                    {evalResults._applied.filter(r=>r.ok).map((rec,i)=>{
                      const sevColor=rec.severity==='critical'?'#ef4444':rec.severity==='high'?'#f97316':rec.severity==='medium'?'#f59e0b':'#94a3b8';
                      return(
                        <div key={rec.id||i} className="rounded-lg px-3 py-2"
                          style={{background:'#22c55e06',border:'1px solid #22c55e22'}}>
                          <div className="flex items-center gap-2 flex-wrap">
                            <span className="text-green-500 text-xs font-bold">✓</span>
                            <span className="text-xs font-bold px-1.5 py-0.5 rounded-full"
                              style={{background:sevColor+'18',color:sevColor,border:`1px solid ${sevColor}33`,fontSize:'10px'}}>
                              {rec.severity?.toUpperCase()}
                            </span>
                            <span className="text-xs font-bold px-1.5 py-0.5 rounded-full"
                              style={{background:'#3b82f618',color:'#60a5fa',border:'1px solid #3b82f633',fontSize:'10px'}}>
                              {rec.category}
                            </span>
                            <span className="text-xs font-semibold text-gray-200">{rec.title}</span>
                            {rec.qualityScore&&<span className="text-xs text-gray-600 ml-auto">Q:{rec.qualityScore}/10</span>}
                          </div>
                          <div className="mt-1 rounded-lg px-2 py-1"style={{background:'#0a0e1a',border:'1px solid #1e2d4a'}}>
                            <div className="text-xs text-gray-600">
                              <span className="text-red-400 line-through">{rec.paramBefore}</span>
                              <span className="text-gray-700 mx-2">→</span>
                              <span className="text-green-400 font-semibold">{rec.paramAfter}</span>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* Deferred recommendations (waiting for right timing) */}
              {evalResults._deferred&&evalResults._deferred.length>0&&(
                <div className="px-4 py-3"style={{borderBottom:'1px solid #1e2d4a'}}>
                  <div className="text-xs font-semibold text-yellow-500 mb-2">
                    Deferred ({evalResults._deferred.length} — waiting for right timing)
                  </div>
                  {evalResults._deferred.map((rec,i)=>(
                    <div key={rec.id||i} className="text-xs text-gray-500 mb-1">
                      <span className="text-yellow-600 mr-1">⏳</span>
                      <span className="font-semibold text-gray-400">{rec.title}</span>
                      <span className="text-gray-600"> — apply after {rec.applyAfter}</span>
                    </div>
                  ))}
                </div>
              )}

              {/* Filtered out (below quality threshold) */}
              {evalResults._filtered&&evalResults._filtered.length>0&&(
                <div className="px-4 py-3">
                  <div className="text-xs font-semibold text-gray-600 mb-2">
                    Filtered Out ({evalResults._filtered.length} — insufficient evidence)
                  </div>
                  {evalResults._filtered.map((rec,i)=>(
                    <div key={rec.id||i} className="text-xs text-gray-600 mb-1">
                      <span className="text-gray-700 mr-1">✕</span>
                      <span>{rec.title}</span>
                      <span className="text-gray-700"> — Q:{rec.qualityScore||'?'}/10</span>
                    </div>
                  ))}
                </div>
              )}

              {/* All recommendations passed quality gates or none returned */}
              {(!evalResults._applied||evalResults._applied.length===0)&&(!evalResults._filtered||evalResults._filtered.length===0)&&
                evalResults.recommendations&&evalResults.recommendations.length>0&&(
                <div className="px-4 py-3">
                  <div className="text-xs font-semibold text-gray-400 mb-2">
                    Recommendations ({evalResults.recommendations.length})
                  </div>
                  <div className="space-y-1.5">
                    {evalResults.recommendations.map((rec,i)=>{
                      const sevColor=rec.severity==='critical'?'#ef4444':rec.severity==='high'?'#f97316':rec.severity==='medium'?'#f59e0b':'#94a3b8';
                      return(
                        <div key={rec.id||i} className="rounded-lg px-3 py-2"
                          style={{background:'#0d1120',border:'1px solid #1e2d4a'}}>
                          <div className="flex items-center gap-2 flex-wrap">
                            <span className="text-xs font-bold px-1.5 py-0.5 rounded-full"
                              style={{background:sevColor+'18',color:sevColor,border:`1px solid ${sevColor}33`,fontSize:'10px'}}>
                              {rec.severity?.toUpperCase()}
                            </span>
                            <span className="text-xs font-bold px-1.5 py-0.5 rounded-full"
                              style={{background:'#3b82f618',color:'#60a5fa',border:'1px solid #3b82f633',fontSize:'10px'}}>
                              {rec.category}
                            </span>
                            <span className="text-xs font-semibold text-gray-200">{rec.title}</span>
                          </div>
                          <div className="text-xs text-gray-500 mt-1">{rec.finding}</div>
                          <div className="mt-1 rounded-lg px-2 py-1"style={{background:'#0a0e1a',border:'1px solid #1e2d4a'}}>
                            <div className="text-xs text-gray-600">
                              <span className="text-red-400 line-through">{rec.paramBefore}</span>
                              <span className="text-gray-700 mx-2">→</span>
                              <span className="text-green-400 font-semibold">{rec.paramAfter}</span>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          )}

          {evalStatus==='error'&&(
            <div className="px-4 py-4 text-center"style={{background:'#7f1d1d22'}}>
              <div className="text-sm text-red-400">Evaluation failed</div>
              <div className="text-xs text-gray-600 mt-1">Check console for details. Try again.</div>
            </div>
          )}

          {/* ── CONSISTENCY TEST ── */}
          <div className="px-4 py-3"style={{borderTop:'1px solid #0f1828'}}>
            <div className="flex items-center justify-between mb-2">
              <div className="text-xs font-bold uppercase tracking-wider text-gray-600">
                Consistency Test
              </div>
              <div className="flex items-center gap-2">
                <span className="text-xs text-gray-600">Runs:</span>
                <select value={consistencyN} onChange={e=>setConsistencyN(parseInt(e.target.value))}
                  className="text-xs rounded px-1.5 py-0.5"
                  style={{background:'#1e2d4a',color:'#94a3b8',border:'1px solid #2d3f5a',outline:'none'}}>

                <button onClick={runConsistencyTest}

                    color:consistencyStatus==='running'?'#9ca3af':'#f59e0b',
                    border:`1px solid ${consistencyStatus==='running'?'#4b556333':'#f59e0b33'}`}}>
                  {consistencyStatus==='running'?<><Spin/><span>Running {consistencyN} evals…</span></>:'🔬 Test Confidence'}
                </button>
              </div>
            </div>

            {consistencyStatus==='running'&&(
              <div className="mt-2">
                <div className="w-full h-1.5 rounded-full overflow-hidden"style={{background:'#1e2d4a'}}>
                  <div className="h-full rounded-full transition-all"
                    style={{width:`${Math.min((consistencyProgress/(consistencyN*100))*100,95)}%`,background:'#f59e0b'}}/>
                </div>
                <div className="text-xs text-gray-600 mt-1 text-center">

                </div>
              </div>
            )}

            {consistencyStatus==='done'&&consistencyReport&&!consistencyReport.error&&(
              <div className="mt-2 space-y-3">
                {/* Overall confidence banner */}
                <div className="rounded-xl px-4 py-3 flex items-center gap-4"
                  style={{background:
                    consistencyReport.overallConfidence>=80?'#22c55e0a':
                    consistencyReport.overallConfidence>=50?'#f59e0b0a':'#ef44440a',
                    border:`1px solid ${
                    consistencyReport.overallConfidence>=80?'#22c55e33':
                    consistencyReport.overallConfidence>=50?'#f59e0b33':'#ef444433'}`}}>
                  <div className="text-center">
                    <div className="text-2xl font-black"style={{color:
                      consistencyReport.overallConfidence>=80?'#22c55e':
                      consistencyReport.overallConfidence>=50?'#f59e0b':'#ef4444'}}>

                    </div>
                    <div className="text-xs text-gray-500">Confidence</div>
                  </div>
                  <div className="flex-1">
                    <div className="text-sm font-bold"style={{color:
                      consistencyReport.overallConfidence>=80?'#22c55e':
                      consistencyReport.overallConfidence>=50?'#f59e0b':'#ef4444'}}>
                      {consistencyReport.confidenceLabel} Reproducibility
                    </div>
                    <div className="text-xs text-gray-500 mt-0.5">
                      {consistencyReport.runsCompleted} runs completed — {consistencyReport.stableRecommendations.length} stable recs,{' '}
                      {consistencyReport.unstableRecommendations.length} unstable
                    </div>
                  </div>
                  <div className="text-center">
                    <div className="text-xs text-gray-600">Grade</div>
                    <div className="text-sm font-bold text-gray-300">
                      {consistencyReport.grades.join(' / ')}
                    </div>
                    <div className="text-xs text-gray-600">{consistencyReport.gradeConsistency}% agree</div>
                  </div>
                  <div className="text-center">
                    <div className="text-xs text-gray-600">Risk</div>
                    <div className="text-sm font-bold text-gray-300">
                      {consistencyReport.riskMean} ± {consistencyReport.riskStdDev}
                    </div>
                  </div>
                </div>

                {/* Stable recommendations */}
                {consistencyReport.stableRecommendations.length>0&&(
                  <div>
                    <div className="text-xs font-semibold text-green-400 mb-1.5">
                      Stable Findings (same category+severity in 60%+ of runs)
                    </div>
                    <div className="space-y-1.5">
                      {consistencyReport.stableRecommendations.map((sr,i)=>{
                        const rec=sr.example;
                        const sevColor=rec.severity==='critical'?'#ef4444':rec.severity==='high'?'#f97316':rec.severity==='medium'?'#f59e0b':'#94a3b8';
                        return(
                          <div key={i} className="rounded-lg px-3 py-2"
                            style={{background:'#22c55e06',border:'1px solid #22c55e22'}}>
                            <div className="flex items-center gap-2 flex-wrap">
                              <span className="text-xs font-black px-1.5 py-0.5 rounded"
                                style={{background:'#22c55e22',color:'#22c55e'}}>{sr.stability}%</span>
                              <span className="text-xs font-bold px-1.5 py-0.5 rounded-full"
                                style={{background:sevColor+'18',color:sevColor,border:`1px solid ${sevColor}33`,fontSize:'10px'}}>
                                {rec.severity?.toUpperCase()}
                              </span>
                              <span className="text-xs px-1.5 py-0.5 rounded-full"
                                style={{background:'#3b82f618',color:'#60a5fa',border:'1px solid #3b82f633',fontSize:'10px'}}>
                                {rec.category}
                              </span>
                              <span className="text-xs font-semibold text-gray-200">{rec.title}</span>
                              <span className="text-xs text-gray-600 ml-auto">{sr.appearedIn}/{sr.totalRuns} runs</span>
                            </div>
                            {sr.variations&&sr.variations.length>1&&(
                              <div className="mt-1 pl-2 border-l-2"style={{borderColor:'#22c55e33'}}>
                                <div className="text-xs text-gray-600 mb-0.5">Phrased as:</div>
                                {sr.variations.map((v,j)=>(
                                  <div key={j} className="text-xs text-gray-500">• {v}</div>
                                ))}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {/* Unstable recommendations */}
                {consistencyReport.unstableRecommendations.length>0&&(
                  <div>
                    <div className="text-xs font-semibold text-red-400 mb-1.5">
                      Inconsistent Findings (category+severity in &lt;60% of runs)
                    </div>
                    <div className="space-y-1">
                      {consistencyReport.unstableRecommendations.map((ur,i)=>(
                        <div key={i} className="rounded-lg px-3 py-1.5"
                          style={{background:'#ef44440a',border:'1px solid #ef444422'}}>
                          <div className="flex items-center gap-2">
                            <span className="text-xs font-black px-1.5 py-0.5 rounded"
                              style={{background:'#ef444422',color:'#ef4444'}}>{ur.stability}%</span>
                            <span className="text-xs text-gray-500">{ur.example.severity}</span>
                            <span className="text-xs text-gray-500">{ur.example.category}</span>
                            <span className="text-xs text-gray-400">{ur.example.title}</span>
                            <span className="text-xs text-gray-600 ml-auto">{ur.appearedIn}/{ur.totalRuns} runs</span>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Category stability */}
                <div>
                  <div className="text-xs font-semibold text-gray-500 mb-1.5">Category Detection Stability</div>
                  <div className="flex flex-wrap gap-2">
                    {consistencyReport.categoryStability.map((cs,i)=>(
                      <div key={i} className="flex items-center gap-1.5 px-2 py-1 rounded-lg text-xs"
                        style={{background:'#1e2d4a44',border:'1px solid #1e2d4a'}}>
                        <span className="font-semibold text-gray-300">{cs.category}</span>
                        <span style={{color:cs.stability>=80?'#22c55e':cs.stability>=50?'#f59e0b':'#ef4444'}}>{cs.stability}%</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {consistencyStatus==='done'&&consistencyReport&&consistencyReport.error&&(
              <div className="text-xs text-red-400 mt-2">{consistencyReport.error}</div>
            )}
          </div>
        </Card>

        {/* ── what to do next ── */}
        <Card>
          <div className="px-4 py-3 text-xs font-bold uppercase tracking-wider text-gray-500"
            style={{borderBottom:'1px solid #0f1828'}}>
            Signal Sources
          </div>
          {[
            {icon:'🏛️',title:'Capitol Trades',desc:'Congress member buys — cluster buys near legislation = strong signal',color:'#f59e0b',url:'https://www.capitoltrades.com'},
            {icon:'🔍',title:'Finviz MR Screener',desc:'RSI<10 stocks above 200 EMA — paste tickers into Claude for scoring',color:'#3b82f6',url:'https://finviz.com/screener.ashx?v=111&f=rsi_os10,ma200_pa,cap_midover&o=-rsi'},
            {icon:'😱',title:'CNN Fear & Greed',desc:'Current market sentiment 0–100',color:'#6366f1',url:'https://cnn.com/markets/fear-and-greed'},
            {icon:'🌍',title:'World Monitor',desc:'Geopolitical risk — escalation = reduce exposure',color:'#94a3b8',url:'https://worldmonitor.app'},
          ].map((a,i)=>(
            <div key={i} className="flex items-start gap-3 px-4 py-3"
              style={{borderTop:'1px solid #0f1828',background:'#0a0e1a'}}>
              <span className="text-xl mt-0.5">{a.icon}</span>
              <div className="flex-1 min-w-0">
                <div className="text-sm font-bold mb-0.5"style={{color:a.color}}>{a.title}</div>
                <div className="text-xs text-gray-500 leading-relaxed">{a.desc}</div>
                <a href={a.url} target="_blank" rel="noreferrer"
                  className="text-xs text-blue-500 mt-1 inline-block">Open ↗</a>

          ))}

        {/* ── phase tracker ── */}
        <Card className="p-4">
          <div className="text-xs font-bold uppercase tracking-wider text-gray-500 mb-3">Where You Are</div>
          <div className="space-y-2">
            {[
              {n:0,l:'Setup & config',done:true,d:'Databases, dashboard, skill, agents ✅'},
              {n:1,l:'Paper trading — 4 weeks',active:true,d:'Target: 20+ trades · Win rate >50% · All rules followed · 0 real money'},
              {n:2,l:'Small capital (10%)',d:'After Phase 1 passes. Max 1% position size.'},
              {n:3,l:'Growing capital (40%)',d:'After Phase 2. Standard sizing.'},

              <div key={i} className="flex items-start gap-3">

      </div>
    </div>
  );
}

// ─── JOURNAL (second view) ───────────────────────────────────────────────
function Journal({onBack,notionTrades}){
  const [trades,setTrades]=useState(()=>{
    // Prefer Notion data if available, fall back to localStorage
    if(notionTrades&&notionTrades.length)return notionTrades;
    const s=load('inv_trades',null);
    if(!s){save('inv_trades',DEMO_TRADES);return DEMO_TRADES;}return s;
  });
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({ticker:'',strategy:'Mean Reversion',status:'Paper',
    dateOpened:todayStr(),dateClosed:'',score:'',entryPrice:'',stopLoss:'',exitPrice:'',
    rulesFollowed:true,right:'',lesson:''});
  const canvasRef=useRef(null);const chartRef=useRef(null);

  const closed=trades.filter(t=>t.pnlPct!=null&&t.status!=='Open');
  const wins=closed.filter(t=>t.pnlPct>0);
  const losses=closed.filter(t=>t.pnlPct<=0);
  const stats={
    winRate:closed.length?Math.round(wins.length/closed.length*100):0,
    avgWin:wins.length?(wins.reduce((s,t)=>s+t.pnlPct,0)/wins.length).toFixed(1):0,
    avgLoss:losses.length?(losses.reduce((s,t)=>s+t.pnlPct,0)/losses.length).toFixed(1):0,
    total:closed.reduce((s,t)=>s+t.pnlPct,0).toFixed(1),
    compliance:trades.length?Math.round(trades.filter(t=>t.rulesFollowed).length/trades.length*100):100,
  };

  useEffect(()=>{
    const sorted=[...closed].sort((a,b)=>new Date(a.dateOpened)-new Date(b.dateOpened));
    if(!canvasRef.current||!sorted.length)return;
    if(chartRef.current){chartRef.current.destroy();}
    let cum=0;const cums=sorted.map(t=>{cum+=t.pnlPct;return parseFloat(cum.toFixed(2));});
    chartRef.current=new Chart(canvasRef.current,{
      type:'bar',
      data:{labels:sorted.map(t=>t.ticker),datasets:[
        {type:'line',label:'Cumulative %',data:cums,borderColor:'#6366f1',borderWidth:2,
         pointRadius:4,pointBackgroundColor:'#6366f1',fill:true,
         backgroundColor:'rgba(99,102,241,0.07)',tension:0.3,yAxisID:'y2'},
        {type:'bar',label:'Trade %',data:sorted.map(t=>parseFloat(t.pnlPct.toFixed(2))),
         backgroundColor:sorted.map(t=>t.pnlPct>0?'rgba(34,197,94,0.6)':'rgba(239,68,68,0.6)'),
         yAxisID:'y1'},
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{
          x:{ticks:{color:'#475569',font:{size:9}},grid:{color:'#0f1828'}},
          y1:{type:'linear',position:'left',ticks:{color:'#94a3b8',font:{size:9},callback:v=>`${v>0?'+':''}${v}%`},grid:{color:'#0f1828'}},
          y2:{type:'linear',position:'right',ticks:{color:'#6366f1',font:{size:9},callback:v=>`${v>0?'+':''}${v}%`},grid:{drawOnChartArea:false}},
        },
      },
    });
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[trades]);

  const setF=(k,v)=>setForm(p=>({...p,[k]:v}));
  const saveTrade=()=>{
    if(!form.ticker.trim())return;
    const pnlPct=form.exitPrice&&form.entryPrice
      ?((Number(form.exitPrice)-Number(form.entryPrice))/Number(form.entryPrice)*100):null;
    const t={...form,id:Date.now(),ticker:form.ticker.toUpperCase(),pnlPct};
    const u=[t,...trades];setTrades(u);save('inv_trades',u);setShowForm(false);
    // Auto-sync to Notion Trade Journal (silent, non-blocking)
    if(window.location.protocol!=='file:'){
      fetch('/api/log-trade',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify(t)}).catch(()=>{});
    }
  };
  const del=id=>{if(!confirm('Delete?'))return;const u=trades.filter(t=>t.id!==id);setTrades(u);save('inv_trades',u);};

  return(
    <div className="min-h-screen"style={{background:'#07090f'}}>
      <div className="sticky top-0 z-20 px-4 pt-4 pb-3"style={{background:'#07090f',borderBottom:'1px solid #0d1120'}}>
        <div className="max-w-2xl mx-auto flex items-center justify-between">
          <button onClick={onBack} className="flex items-center gap-1.5 text-sm font-semibold text-indigo-400">
            ← Daily Brief
          </button>
          <span className="font-black text-white">Trade Journal</span>
          <div className="w-20"/>
        </div>
      </div>

      <div className="px-4 py-4 max-w-2xl mx-auto space-y-4 pb-20">

        {/* stats */}
        <div className="grid grid-cols-5 gap-2">
          {[
            {l:'Win Rate',v:`${stats.winRate}%`,c:stats.winRate>=55?'#22c55e':'#f59e0b'},
            {l:'Avg Win',v:`+${stats.avgWin}%`,c:'#22c55e'},
            {l:'Avg Loss',v:`${stats.avgLoss}%`,c:'#ef4444'},
            {l:'Total P&L',v:`${stats.total>=0?'+':''}${stats.total}%`,c:stats.total>=0?'#22c55e':'#ef4444'},
            {l:'Rules',v:`${stats.compliance}%`,c:stats.compliance>=90?'#22c55e':'#f59e0b'},
          ].map((s,i)=>(
            <Card key={i} className="p-2.5 text-center">
              <div className="text-xs text-gray-600 mb-1">{s.l}</div>
              <div className="font-black text-sm"style={{color:s.c}}>{s.v}</div>
            </Card>
          ))}
        </div>

        {/* chart */}
        <Card className="p-4"style={{height:220}}>
          <canvas ref={canvasRef} style={{maxHeight:188}}/>
        </Card>

        {/* log button */}
        <button onClick={()=>setShowForm(!showForm)}
          className="w-full py-2.5 rounded-2xl text-sm font-bold text-white"
          style={{background:showForm?'#374151':'#1d4ed8'}}>
          {showForm?'✕ Cancel':'+ Log Trade'}
        </button>

        {showForm&&(
          <Card className="p-4 space-y-3">
            <div className="grid grid-cols-2 gap-3">
              {[{l:'Ticker',k:'ticker',t:'text'},{l:'Date Opened',k:'dateOpened',t:'date'},
                {l:'Composite Score',k:'score',t:'number'},{l:'Entry Price ($)',k:'entryPrice',t:'number'},
                {l:'Stop-Loss ($)',k:'stopLoss',t:'number'},{l:'Exit Price ($)',k:'exitPrice',t:'number'},
              ].map(f=>(
                <div key={f.k}>
                  <label className="text-xs text-gray-500 block mb-1">{f.l}</label>
                  <input type={f.t} value={form[f.k]} onChange={e=>setF(f.k,e.target.value)}
                    className="w-full px-3 py-2 text-sm"/>
                </div>
              ))}
              <div>
                <label className="text-xs text-gray-500 block mb-1">Strategy</label>
                <select value={form.strategy} onChange={e=>setF('strategy',e.target.value)} className="w-full px-3 py-2 text-sm">
                  <option>Mean Reversion</option><option>Breakout Momentum</option><option>Earnings Catalyst</option>
                </select>
              </div>
              <div>
                <label className="text-xs text-gray-500 block mb-1">Status</label>
                <select value={form.status} onChange={e=>setF('status',e.target.value)} className="w-full px-3 py-2 text-sm">
                  <option>Open</option><option>Closed</option><option>Paper</option>
                </select>
              </div>
            </div>
            {[{l:'Why did you enter? (signals)',k:'right'},{l:'Lesson learned',k:'lesson'}].map(f=>(
              <div key={f.k}>
                <label className="text-xs text-gray-500 block mb-1">{f.l}</label>
                <textarea value={form[f.k]} onChange={e=>setF(f.k,e.target.value)}
                  className="w-full px-3 py-2 text-xs resize-none"rows={2}/>
              </div>
            ))}
            <label className="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" checked={form.rulesFollowed}
                onChange={e=>setF('rulesFollowed',e.target.checked)} className="w-4 h-4"/>
              <span className="text-xs text-gray-400">All rules followed</span>
            </label>
            <button onClick={saveTrade}
              className="w-full py-2.5 rounded-2xl text-sm font-bold text-white"style={{background:'#1d4ed8'}}>
              Save
            </button>
          </Card>
        )}

        {/* trades list */}
        <div className="space-y-2">
          {trades.map(t=>(
            <Card key={t.id} className="p-3">
              <div className="flex justify-between items-start">
                <div className="flex items-center gap-2 flex-wrap">
                  <span className="font-black text-base text-white">{t.ticker}</span>
                  <span className="text-xs text-gray-600">{t.strategy}</span>
                  <span className="text-xs px-1.5 py-0.5 rounded-full"
                    style={{background:t.status==='Open'?'#14532d':t.status==='Paper'?'#1e3a5f':'#1f2937',
                      color:t.status==='Open'?'#4ade80':t.status==='Paper'?'#60a5fa':'#9ca3af'}}>
                    {t.status}
                  </span>
                  {t.score&&<Pill text={`${t.score}/100`} color={t.score>=80?'#22c55e':t.score>=65?'#84cc16':'#f59e0b'}/>}
                </div>
                <div className="flex items-center gap-2 flex-shrink-0">
                  {t.pnlPct!=null&&(
                    <span className="font-black text-lg"style={{color:t.pnlPct>0?'#22c55e':'#ef4444'}}>
                      {t.pnlPct>0?'+':''}{t.pnlPct.toFixed(1)}%
                    </span>
                  )}
                  <button onClick={()=>del(t.id)} className="text-xs text-gray-700 hover:text-red-500">✕</button>
                </div>
              </div>
              <div className="flex flex-wrap gap-3 text-xs text-gray-600 mt-1">
                {t.entryPrice&&<span>In: ${t.entryPrice}</span>}
                {t.exitPrice&&<span>Out: ${t.exitPrice}</span>}
                {t.stopLoss&&<span>SL: ${t.stopLoss}</span>}
                <span>{t.dateOpened}</span>
              </div>
              {!t.rulesFollowed&&(
                <div className="text-xs text-red-500 mt-1 leading-relaxed">
                  <span className="font-bold">⚠️ Rules violated:</span>
                  {' '}
                  {(()=>{
                    const violations=[];
                    if(t.score&&t.score<65)violations.push(`Score ${t.score} below 65 entry threshold`);
                    if(t.positionPct&&t.positionPct>5)violations.push(`Position ${t.positionPct}% exceeds 5% max`);
                    if(!t.stopLoss)violations.push('No stop-loss set');
                    if(t.entryPrice&&t.stopLoss&&((t.entryPrice-t.stopLoss)/t.entryPrice)>0.10)violations.push('Stop-loss >10% from entry');
                    if(t.wrong)violations.push(t.wrong);
                    return violations.length?violations.join(' · '):'Marked manually — check trade notes';
                  })()}
                </div>
              )}
              {t.lesson&&<div className="text-xs text-indigo-400 mt-1">💡 {t.lesson}</div>}
            </Card>
          ))}
        </div>

      </div>
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────
function App(){
  const [view,setView]=useState('brief');
  const [notionJournal,setNotionJournal]=useState([]);
  window._openJournal=(trades)=>{
    if(trades)setNotionJournal(trades);
    setView('journal');
  };

  // Fetch all trades for journal from Notion on first journal open
  const openJournal=useCallback(async()=>{
    if(window.location.protocol!=='file:'){
      try{
        const r=await fetch('/api/get-positions');
        const d=await r.json();
        const all=[...(d.positions||[]),...(d.closedTrades||[])].map(t=>({
          id:t.id,ticker:t.ticker,strategy:t.strategy,status:t.status,
          dateOpened:t.dateOpened,dateClosed:t.dateClosed,
          entryPrice:t.entryPrice,exitPrice:t.exitPrice,stopLoss:t.stopLoss,
          score:t.score,pnlPct:t.pnlPct||t.livePnlPct,
          rulesFollowed:t.rulesFollowed,right:t.right,lesson:t.lesson,
        }));
        setNotionJournal(all);
      }catch{}
    }
    setView('journal');
  },[]);

  window._openJournal=openJournal;

  if(view==='journal')return<Journal onBack={()=>setView('brief')} notionTrades={notionJournal}/>;
  return<DailyBrief/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
